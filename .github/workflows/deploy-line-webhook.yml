name: Deploy line-webhook (Supabase)

# supabase/functions/line-webhook/ を main に push すると自動でデプロイする。
# 手動実行(workflow_dispatch)も可能。
#
# 必要なリポジトリ Secrets:
#   SUPABASE_ACCESS_TOKEN … Supabase アカウントのアクセストークン（Account > Access Tokens）
#   SUPABASE_PROJECT_REF  … プロジェクト参照ID（Project Settings > General > Reference ID）
# ※ Secrets が未設定でもジョブは失敗せず「スキップ」する（設定した時点から自動デプロイが有効）。
# ※ 関数側の Secrets（LINE_TOKEN 等）は Supabase 側で設定済みのものがそのまま使われる。
# ※ LINE からの Webhook は Supabase JWT を持たないため --no-verify-jwt で公開する。

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/line-webhook/**"
      - ".github/workflows/deploy-line-webhook.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets
        id: check
        env:
          TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "$TOKEN" ] || [ -z "$REF" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN / SUPABASE_PROJECT_REF が未設定のためデプロイをスキップしました。リポジトリの Settings > Secrets で設定してください。"
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.check.outputs.ok == 'true'
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        if: steps.check.outputs.ok == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy function
        if: steps.check.outputs.ok == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy line-webhook --no-verify-jwt --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
