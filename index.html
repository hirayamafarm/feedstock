// ── Supabase 接続 ───────────────────────────────
const CONFIGURED = !String(window.SUPABASE_URL).includes("ここに") && /^https?:\/\//.test(String(window.SUPABASE_URL));
const sb = CONFIGURED ? window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY) : null;
const STATE_ID = "main";   // 在庫データは1行で共有

async function loadState() {
  const { data, error } = await sb.from("app_state").select("data").eq("id", STATE_ID).maybeSingle();
  if (error) { console.error(error); return null; }
  return data ? data.data : null;
}
async function saveState(s) {
  const { error } = await sb.from("app_state").upsert({ id: STATE_ID, data: s, updated_at: new Date().toISOString() });
  if (error) { console.error(error); return false; }
  return true;
}
async function loadLog() {
  const { data, error } = await sb.from("change_log").select("*").order("at", { ascending: false }).limit(100);
  if (error) { console.error(error); return []; }
  return data || [];
}
async function appendLog(entry) {

// ── データ消失対策 ────────────────────────────────
const LS_CACHE_KEY = "feedInventory:cache:v1";
const LS_CACHE_AT_KEY = "feedInventory:cache:at:v1";
const LS_LAST_BACKUP_KEY = "feedInventory:lastBackup:v1";
// state をブラウザに自動保存（Supabaseの障害・通信切れに備え）
function cacheStateLocally(s){
  try{ localStorage.setItem(LS_CACHE_KEY, JSON.stringify(s)); localStorage.setItem(LS_CACHE_AT_KEY, new Date().toISOString()); }catch(e){}
}
function loadCachedState(){

function lastBackupAt(){ return localStorage.getItem(LS_LAST_BACKUP_KEY); }
function markBackupDone(){ localStorage.setItem(LS_LAST_BACKUP_KEY, new Date().toISOString()); }
function downloadBackup(state){
  const date=today();
  const payload={ version:1, exportedAt:new Date().toISOString(), state };
  const text=JSON.stringify(payload, null, 2);
  const blob=new Blob([text], {type:"application/json;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=`makiba-backup-${date}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  markBackupDone();
}
function parseBackupFile(file){
  return new Promise((res,rej)=>{
    const fr=new FileReader();
    fr.onload=()=>{ try{ const j=JSON.parse(fr.result); if(!j||!j.state||!j.state.items) return rej(new Error("バックアップ形式が違います")); res(j.state); }catch(e){ rej(e); } };
    fr.onerror=()=>rej(new Error("ファイルを読めません"));
    fr.readAsText(file);
  });
}

// ── ユーティリティ ──────────────────────────────
const fmt = (n) => n == null || isNaN(n) ? "—" : Number(n).toLocaleString("ja-JP", { maximumFractionDigits: 1 });

const iso = (y, m, d) => `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

// 残り月数から「日数」「予想切れ日(M/D)」を作るヘルパー
function daysAndEndDate(monthsLeft){
  if(monthsLeft==null) return {days:null,endLabel:null};
  const days=Math.round(monthsLeft*30);
  const d=new Date(); d.setDate(d.getDate()+days);
  const endLabel=`${d.getMonth()+1}/${d.getDate()}`;
  return {days,endLabel};
}

// 農場ごとの色（背景・アクセント・タグ）
function farmColor(fid){
  const idx=FARMS.findIndex(f=>f.id===fid);
  const palette=[
    {bg:"rgba(168,73,47,.07)", accent:"#a8492f", tag:"rgba(168,73,47,.18)"},   // 茶
    {bg:"rgba(58,110,165,.07)", accent:"#3a6ea5", tag:"rgba(58,110,165,.18)"}, // 青
    {bg:"rgba(95,125,60,.07)", accent:"#5f7d3c", tag:"rgba(95,125,60,.18)"},   // 緑
    {bg:"rgba(201,143,42,.07)", accent:"#c98f2a", tag:"rgba(201,143,42,.18)"}, // 黄
  ];
  return palette[(idx<0?0:idx)%palette.length];
}

function unitOf(item){ return item?.unitType==="piece"?"個":"kg"; }

// ── 外部カレンダー連携 ─────────────────────────────
function dateToICS(dateStr){ return dateStr.replace(/-/g,""); }
function addDays(dateStr,n){ const d=new Date(dateStr); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
function nowUTC(){ const d=new Date(); const p=(n)=>String(n).padStart(2,"0"); return `${d.getUTCFullYear()}${p(d.getUTCMonth()+1)}${p(d.getUTCDate())}T${p(d.getUTCHours())}${p(d.getUTCMinutes())}${p(d.getUTCSeconds())}Z`; }
// 外部カレンダー用のラベル: 「場所：餌名」のみ
function orderShortLabel(order){
  const ff=order.forFarm||"shared";
  const place=ff==="shared"?"共通":(FARMS.find(f=>f.id===ff)?.name||ff);
  return `${place}：${order.item.name}`;
}
function buildICS(orders){
  const lines=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Makiba Stock//JP","CALSCALE:GREGORIAN","METHOD:PUBLISH"];
  const stamp=nowUTC();
  for(const o of orders){
    const start=dateToICS(o.etaDate); const end=dateToICS(addDays(o.etaDate,1));
    const summary=orderShortLabel(o);
    lines.push("BEGIN:VEVENT",
      `UID:order-${o.id}@makiba-stock`,
      `DTSTAMP:${stamp}`,
      `DTSTART;VALUE=DATE:${start}`,
      `DTEND;VALUE=DATE:${end}`,
      `SUMMARY:${summary}`,
      "END:VEVENT");
  }
  lines.push("END:VCALENDAR");
  return lines.join("\r\n");
}
function downloadICS(orders, filename="makiba-orders.ics"){
  const text=buildICS(orders);
  const blob=new Blob([text],{type:"text/calendar;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=filename; document.body.appendChild(a); a.click(); document.body.removeChild(a); setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function googleCalendarUrl(order){
  const start=dateToICS(order.etaDate); const end=dateToICS(addDays(order.etaDate,1));
  const text=orderShortLabel(order);
  return `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(text)}&dates=${start}/${end}`;
}
// クリップボードへコピー（フォールバックあり）
async function copyToClipboard(text){
  try{ if(navigator.clipboard&&window.isSecureContext){ await navigator.clipboard.writeText(text); return true; } }catch(e){}
  // フォールバック
  const ta=document.createElement("textarea"); ta.value=text; ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.select();
  let ok=false; try{ ok=document.execCommand("copy"); }catch(e){}
  document.body.removeChild(ta); return ok;
}

function countToKg(item, q){
  if(!q) return 0;
  if(q.__kg!=null) return Number(q.__kg)||0;  // 手入力(kg直接)
  let kg=0; for(const u of (item.units||[])){ const n=q?.[u.id]; if(n) kg+=n*u.kg;} return kg;
}

const SEED = {
  farms: [{ id: "a", name: "第1農場" }, { id: "b", name: "第2農場" }],
  items: [
    { id:1, name:"チモシー乾草", reserveMonths:0.5, farms:["a","b"],

      orders:[{id:901,kg:1200,etaDate:"2026-06-10",received:false}],
      orderPresets:[{id:"p1",label:"コンテナ1台",kg:1200},{id:"p2",label:"ロール10本",kg:3000}] },
    { id:2, name:"アルファルファ牧草", reserveMonths:0.5, farms:["a"],
      units:[{id:"b",label:"ベール",kg:25}],
      counts:{a:[{date:"2026-04-15",qtys:{b:8}},{date:"2026-05-15",qtys:{b:3}}]}, orders:[] },
    { id:3, name:"圧片大麦", reserveMonths:1, farms:["b"],

// ── 消費計算 ────────────────────────────────────
function farmStats(item, fid){
  const counts=[...(item.counts?.[fid]||[])].sort((a,b)=>a.date.localeCompare(b.date));
  const last=counts[counts.length-1]||null, prev=counts[counts.length-2]||null;
  const lastKg=last?countToKg(item,last.qtys):null;
  const fd=item.feedDaily?.[fid];
  let baseDaily=null, source=null;
  if(fd&&fd.dailyKg>0){ baseDaily=fd.dailyKg; source="excel"; }
  else if(last&&prev){
    const days=Math.max(1,Math.round((new Date(last.date)-new Date(prev.date))/86400000));
    const diff=countToKg(item,prev.qtys)-lastKg;
    baseDaily=diff>0?diff/days:0; source="count";
  }
  const extra=(item.extraDaily?.[fid])||0;   // 別給与（1日あたりkg・Excel/棚卸しに含まれない分）
  let dailyKg=baseDaily!=null?baseDaily+extra:(extra>0?extra:null);
  if(baseDaily==null&&extra>0) source="extra";
  const usage=dailyKg!=null?dailyKg*30:null;
  return { last,lastKg,usage,dailyKg,baseDaily,extra,source,lastDate:last?.date||null };
}
// 餌の在庫モード(shared:全農場共通 / split:農場別)。古いデータはsplit扱い。
function stockModeOf(item){ return item?.stockMode==="shared"?"shared":"split"; }
// stockModeに応じた「在庫スコープのリスト」(常に農場別。共通モードは「表示時に合計する」だけ)
function stockScopesOf(item){ return item.farms||[]; }
// 発注の対象農場(古いordersはshared互換)
function orderForFarm(o){ return o.forFarm||"shared"; }

function analyze(item){
  let totalStock=0,totalUsage=0,hasUsage=false,hasExcel=false;
  const scopes=stockScopesOf(item);
  for(const fid of scopes){
    const fs=farmStats(item,fid);
    if(fs.lastKg!=null) totalStock+=fs.lastKg;
    if(fs.usage!=null){ totalUsage+=fs.usage; hasUsage=true; if(fs.source==="excel") hasExcel=true; }
  }
  const pendingKg=(item.orders||[]).filter(o=>!o.received).reduce((s,o)=>s+o.kg,0);
  let suggestedOrder=null, monthsLeft=null;
  if(hasUsage&&totalUsage>0){
    const eff=totalStock+pendingKg; monthsLeft=eff/totalUsage;
    const need=totalUsage*(1+(item.reserveMonths||0));
    suggestedOrder=Math.max(0,Math.ceil(need-eff));
  }
  return { totalStock,pendingKg,totalUsage:hasUsage?totalUsage:null,monthsLeft,suggestedOrder,hasExcel };
}
// 各農場ごとに在庫・消費・残月数・追加発注を出す（参考表示用）
function analyzeByFarm(item){
  const orders=item.orders||[];
  const out={};
  for(const fid of item.farms){
    const fs=farmStats(item,fid);
    const pending=orders.filter(o=>!o.received&&(orderForFarm(o)===fid||orderForFarm(o)==="shared")).reduce((s,o)=>{
      if(orderForFarm(o)==="shared"){
        let tot=0,mine=0; for(const f of item.farms){ const u=farmStats(item,f).usage||0; tot+=u; if(f===fid) mine=u; }
        const share=tot>0?mine/tot:1/item.farms.length;
        return s+o.kg*share;
      }
      return s+o.kg;
    },0);
    const stock=fs.lastKg||0;
    const usage=fs.usage||0;
    let suggested=null, monthsLeft=null;
    if(usage>0){ const eff=stock+pending; monthsLeft=eff/usage; const need=usage*(1+(item.reserveMonths||0)); suggested=Math.max(0,Math.ceil(need-eff)); }
    out[fid]={stock,usage,pending,monthsLeft,suggested,hasUsage:fs.usage!=null,hasExcel:fs.source==="excel"};
  }
  return out;
}
function simulateMonth(item, scope, ymStr){
  const [Y,M]=ymStr.split("-").map(Number); const dim=daysInMonth(Y,M);
  const mode=stockModeOf(item);
  let startDate,startKg,dailyUse; const orders=item.orders||[];
  // 共通モードは scopeに関わらず合計を使う
  const effScope=mode==="shared"?"all":scope;
  if(effScope==="all"){
    let total=0,usageSum=0,latest=null,ok=false;
    for(const fid of item.farms){ const fs=farmStats(item,fid);
      if(fs.lastKg!=null) total+=fs.lastKg;
      if(fs.lastDate&&(!latest||fs.lastDate>latest)) latest=fs.lastDate;
      if(fs.usage!=null){ usageSum+=fs.usage; ok=true; } }
    startDate=latest; startKg=total; dailyUse=ok?usageSum/30:0;
  } else {
    const fs=farmStats(item,effScope); startDate=fs.lastDate; startKg=fs.lastKg||0; dailyUse=(fs.usage||0)/30;
  }
  if(!startDate) return null;
  // 入荷の按分（農場別モードで、ある農場だけを見る場合）
  let farmShare=1;
  if(mode==="split"&&effScope!=="all"){
    let us=0,mine=0; for(const fid of item.farms){ const u=farmStats(item,fid).usage||0; us+=u; if(fid===effScope) mine=u; }
    farmShare=us>0?mine/us:1/item.farms.length;
  }
  const arrivals={}, arrInfo={};
  for(const o of orders){
    const fff=orderForFarm(o);
    let k=0;
    if(effScope==="all"){ k=o.kg; }
    else if(fff===effScope){ k=o.kg; }
    else if(fff==="shared"){ k=o.kg*farmShare; }
    else continue;
    arrivals[o.etaDate]=(arrivals[o.etaDate]||0)+k;
    const c=arrInfo[o.etaDate]||{kg:0,anyPending:false,anyReceived:false}; c.kg+=k; if(o.received)c.anyReceived=true; else c.anyPending=true; arrInfo[o.etaDate]=c;
  }
  const cells=[]; let kg=startKg; const monthStart=iso(Y,M,1);
  let cursor=startDate;
  const stepTo=(t)=>{ while(cursor<t){ const d=new Date(cursor); d.setDate(d.getDate()+1); const nx=d.toISOString().slice(0,10); if(arrivals[nx]) kg+=arrivals[nx]; kg=Math.max(0,kg-dailyUse); cursor=nx; } };
  if(cursor<=monthStart) stepTo(monthStart);
  for(let day=1;day<=dim;day++){
    const date=iso(Y,M,day); const info=arrInfo[date];
    if(date<startDate){ cells.push({day,date,kg:null,before:true,info}); continue; }
    if(date===startDate){ cells.push({day,date,kg:startKg,anchor:true,info}); kg=startKg; cursor=date; continue; }
    if(arrivals[date]) kg+=arrivals[date]; kg=Math.max(0,kg-dailyUse); cursor=date;
    cells.push({day,date,kg,info});
  }
  return { cells,dailyUse,startDate,dim,Y,M };
}

// ── メイン ──────────────────────────────────────
function App(){
  const [state,setState]=useState(null);
  const [view,setView]=useState("order");
  const [selId,setSelId]=useState(null);
  const [sync,setSync]=useState("loading");
  const [log,setLog]=useState([]);
  const [me,setMe]=useState("");
  const dirty=useRef(false), loaded=useRef(false), pendingLog=useRef(null);

  useEffect(()=>{ (async()=>{
    if(!CONFIGURED){
      // Supabase未設定でもブラウザキャッシュがあれば使う
      const c=loadCachedState();
      if(c){ setState(c); setSync("noconfig"); }
      else { setSync("noconfig"); }
      return;
    }
    const s=await loadState();
    if(s){ setState(s); cacheStateLocally(s); setSync("saved"); }
    else {
      // Supabaseが空 or 通信失敗 → キャッシュから復元
      const c=loadCachedState();
      if(c){ setState(c); setSync("error"); }
      else { setState(SEED); const ok=await saveState(SEED); cacheStateLocally(SEED); setSync(ok?"saved":"error"); }
    }
    setLog(await loadLog()); loaded.current=true;
  })(); },[]);

  useEffect(()=>{
    if(!loaded.current||!dirty.current||!state) return;
    setSync("saving");
    cacheStateLocally(state); // 保存実行前にもキャッシュ
    saveState(state).then(async(ok)=>{
      setSync(ok?"saved":"error");
      if(ok){ cacheStateLocally(state); }
      if(ok&&pendingLog.current){ const e={who:me||"(名前未設定)",what:pendingLog.current,at:new Date().toISOString()};
        await appendLog(e); setLog(l=>[e,...l].slice(0,100)); }
      pendingLog.current=null;
    });
    dirty.current=false;
  },[state]);

  useEffect(()=>{ const t=setInterval(async()=>{ if(dirty.current||!loaded.current) return;
    const s=await loadState(); if(s){ cacheStateLocally(s); setState(p=>JSON.stringify(p)===JSON.stringify(s)?p:s); } },30000); return ()=>clearInterval(t); },[]);

  if(sync==="noconfig") return <Config/>;
  if(!state) return <div style={S.loading}>読み込み中…</div>;
  FARMS = (state.farms&&state.farms.length>0)?state.farms:DEFAULT_FARMS;

  const update=(fn,desc)=>{ dirty.current=true; if(desc) pendingLog.current=desc; setState(p=>fn(JSON.parse(JSON.stringify(p)))); };
  const refreshNow=async()=>{ const s=await loadState(); if(s){ setState(s); setSync("saved"); } setLog(await loadLog()); };
  const nameOf=(id)=>state.items.find(i=>i.id===id)?.name||"餌";
  const saveCount=(id,fid,date,qtys)=>{
    // 棚卸し前の状態で予測残量を計算し、差分を記録
    const it=state.items.find(i=>i.id===id);
    let pred=null;
    if(it){
      const counts=[...(it.counts?.[fid]||[])].sort((a,b)=>a.date.localeCompare(b.date)).filter(c=>ym(c.date)!==ym(date));
      if(counts.length>0){
        const last=counts[counts.length-1];
        const fs=farmStats(it,fid); const dailyKg=fs.dailyKg||0;
        const days=Math.max(0,Math.round((new Date(date)-new Date(last.date))/86400000));
        let arrival=0;
        for(const o of (it.orders||[])){ if(o.etaDate>last.date&&o.etaDate<=date){
          // 農場別に按分（消費比）
          let share=1;
          if(it.farms.length>1){ let total=0,mine=0; for(const ff of it.farms){ const u=farmStats(it,ff).usage||0; total+=u; if(ff===fid) mine=u; } share=total>0?mine/total:1/it.farms.length; }
          arrival+=o.kg*share;
        } }
        pred=Math.max(0, countToKg(it,last.qtys) - dailyKg*days + arrival);
      }
    }
    update(s=>{
      const it2=s.items.find(i=>i.id===id); it2.counts=it2.counts||{}; it2.counts[fid]=it2.counts[fid]||[];
      const ex=it2.counts[fid].find(c=>ym(c.date)===ym(date)); if(ex){ex.date=date;ex.qtys=qtys;} else it2.counts[fid].push({date,qtys});
      // 差分記録
      if(pred!=null){
        const actual=countToKg(it2,qtys);
        const diff=actual-pred;
        const pct=pred>0?(diff/pred*100):null;
        s.discrepancies=s.discrepancies||[];
        // 同じ餌・農場・棚卸し月の記録があれば置き換え
        s.discrepancies=s.discrepancies.filter(r=>!(r.itemId===id&&r.farmId===fid&&ym(r.date)===ym(date)));
        s.discrepancies.unshift({itemId:id,farmId:fid,date,predictedKg:pred,actualKg:actual,diffKg:diff,pctDiff:pct,recordedAt:new Date().toISOString()});
        s.discrepancies=s.discrepancies.slice(0,200);
      }
      return s;
    },`棚卸し: ${nameOf(id)}（${FARMS.find(f=>f.id===fid)?.name} ${date}）${pred!=null?` 予測${fmt(Math.round(pred))}kg→実測${fmt(Math.round(countToKg(it,qtys)))}kg`:""}`);
  };
  const addOrder=(id,kg,etaDate,forFarm)=>update(s=>{ const it=s.items.find(i=>i.id===id); it.orders=it.orders||[]; it.orders.push({id:s.nextOrderId,kg,etaDate,forFarm:forFarm||"shared",received:false}); s.nextOrderId++; return s; },
    `発注予定追加: ${nameOf(id)} ${fmt(kg)}kg（${forFarm&&forFarm!=="shared"?`${FARMS.find(f=>f.id===forFarm)?.name||forFarm}・`:"共通・"}入荷${etaDate}）`);
  const addPreset=(id,label,kg)=>update(s=>{ const it=s.items.find(i=>i.id===id); it.orderPresets=it.orderPresets||[]; it.orderPresets.push({id:"p"+Date.now(),label,kg}); return s; },`発注パターン追加: ${nameOf(id)} ${label}`);
  const delPreset=(id,pid)=>update(s=>{ const it=s.items.find(i=>i.id===id); it.orderPresets=(it.orderPresets||[]).filter(p=>p.id!==pid); return s; },`発注パターン削除: ${nameOf(id)}`);
  const toggleReceived=(id,oid)=>update(s=>{ const o=s.items.find(i=>i.id===id).orders.find(x=>x.id===oid); if(o)o.received=!o.received; return s; },`入荷チェック更新: ${nameOf(id)}`);
  const delOrder=(id,oid)=>update(s=>{ const it=s.items.find(i=>i.id===id); it.orders=it.orders.filter(x=>x.id!==oid); return s; },`発注予定削除: ${nameOf(id)}`);
  const addItem=(it)=>update(s=>{ s.items.push({...it,id:s.nextId,counts:{},orders:[]}); s.nextId++; return s; },`餌を追加: ${it.name}`);
  const editItem=(id,patch)=>update(s=>{ const it=s.items.find(i=>i.id===id); if(!it) return s;
    it.name=patch.name; it.unitType=patch.unitType; it.stockMode=patch.stockMode; it.reserveMonths=patch.reserveMonths; it.farms=patch.farms; it.units=patch.units; return s;
  },`餌を編集: ${patch.name}`);
  const delItem=(id)=>update(s=>{ s.items=s.items.filter(i=>i.id!==id); return s; },`餌を削除: ${nameOf(id)}`);
  const applyFeedDaily=(id,fid,info)=>update(s=>{ const it=s.items.find(i=>i.id===id); it.feedDaily=it.feedDaily||{}; it.feedDaily[fid]=info; return s; },
    `給餌Excel取込: ${nameOf(id)}（${FARMS.find(f=>f.id===fid)?.name} 日次${fmt(info.dailyKg)}kg）`);
  const clearFeedDaily=(id,fid)=>update(s=>{ const it=s.items.find(i=>i.id===id); if(it.feedDaily) delete it.feedDaily[fid]; return s; },`給餌Excel取消: ${nameOf(id)}`);
  const setExtra=(id,fid,kg,memo)=>update(s=>{ const it=s.items.find(i=>i.id===id); it.extraDaily=it.extraDaily||{}; it.extraMemo=it.extraMemo||{};
    if(kg>0){ it.extraDaily[fid]=kg; if(memo&&memo.trim()) it.extraMemo[fid]=memo.trim(); else delete it.extraMemo[fid]; }
    else { delete it.extraDaily[fid]; delete it.extraMemo[fid]; }
    return s; },
    `別給与設定: ${nameOf(id)}（${FARMS.find(f=>f.id===fid)?.name} 1日${fmt(kg)}kg${memo?` ${memo}`:""}）`);
  const renameFarm=(fid,name)=>update(s=>{ s.farms=s.farms||DEFAULT_FARMS.slice(); const f=s.farms.find(x=>x.id===fid); if(f) f.name=name; return s; },
    `農場名変更: ${fid}=${name}`);

  // バックアップから復元（state全体を置き換え）
  const restoreState=(newState)=>{
    if(!confirm("現在のデータをすべて上書きしてバックアップから復元します。本当によろしいですか？")) return;
    dirty.current=true;
    pendingLog.current="バックアップから復元しました";

  };

  const sel=state.items.find(i=>i.id===selId);
  return (
    <div style={S.app}>
      <header style={S.header}>
        <div style={S.headerTop}>
          <div style={S.logo}>◣ まきば在庫</div>
          <div style={S.headerRight}>
            <HeaderName me={me} onSet={setMe}/>
            <button style={S.syncBtn} onClick={refreshNow}>{sync==="saving"?"保存中…":sync==="error"?"⚠ 保存失敗":"🔄 更新"}</button>
          </div>
        </div>
        <div style={S.headerSub}>みんなで共有 ・ 棚卸し・発注・残量カレンダー</div>
      </header>
      <main style={S.main}>
        {(view==="order"||view==="inventory"||view==="calendar"||view==="diff"||view==="data"||view==="settings") && (<>
          <div style={S.tabBar} className="no-print">
            <button style={{...S.navTab,...(view==="order"?S.navActive:{})}} onClick={()=>setView("order")}>発注</button>
            <button style={{...S.navTab,...(view==="inventory"?S.navActive:{})}} onClick={()=>setView("inventory")}>棚卸し</button>

          </div>
          {view==="order"&&<OrderView items={state.items} onSelect={id=>{setSelId(id);setView("detail");}} onAddOrder={addOrder} onToggleReceived={toggleReceived} onDelOrder={delOrder}/>}
          {view==="inventory"&&<InventoryView items={state.items} onSave={saveCount} onAdd={()=>setView("add")} onSelect={id=>{setSelId(id);setView("detail");}}/>}

          {view==="settings"&&<SettingsView farms={FARMS} onRenameFarm={renameFarm} state={state} onRestore={restoreState}/>}
        </>)}

      </main>

  );
}

function DiffView({items,records}){
  const [filterItem,setFilterItem]=useState("all");
  const [filterFarm,setFilterFarm]=useState("all");
  const rs=records.filter(r=>(filterItem==="all"||r.itemId===filterItem)&&(filterFarm==="all"||r.farmId===filterFarm));
  const overall=(()=>{
    if(rs.length===0) return null;
    const totalAct=rs.reduce((s,r)=>s+r.actualKg,0);
    const totalPred=rs.reduce((s,r)=>s+r.predictedKg,0);
    const totalDiff=totalAct-totalPred;
    const pct=totalPred>0?(totalDiff/totalPred*100):null;
    return {n:rs.length,totalDiff,pct};
  })();
  return (<div style={S.fade}>
    <h2 style={S.h2}>予測と実測の差</h2>
    <div style={S.lead}>棚卸しを保存するたびに、その時点の予測残量(消費から計算)と実際の在庫を比較して記録します。差が大きい場合は1日あたり消費の見直しや、別給与の確認が必要なサインです。</div>
    <div style={S.inlineRow}>
      <label style={S.colSel}>餌で絞り込み<select style={S.select} value={filterItem} onChange={e=>setFilterItem(e.target.value==="all"?"all":Number(e.target.value))}>
        <option value="all">すべて</option>
        {items.map(it=><option key={it.id} value={it.id}>{it.name}</option>)}
      </select></label>
      <label style={S.colSel}>農場で絞り込み<select style={S.select} value={filterFarm} onChange={e=>setFilterFarm(e.target.value)}>
        <option value="all">すべて</option>
        {FARMS.map(f=><option key={f.id} value={f.id}>{f.name}</option>)}
      </select></label>
    </div>
    {overall&&(<div style={S.resultBox}>
      <div>表示中 {overall.n}件</div>
      <div>差の合計: <b style={{color:overall.totalDiff>=0?"var(--ok)":"var(--bad)"}}>{overall.totalDiff>=0?"+":""}{fmt(Math.round(overall.totalDiff))}kg</b>{overall.pct!=null&&` （${overall.pct>=0?"+":""}${fmt(overall.pct.toFixed(1))}%）`}</div>
      <div style={{fontSize:11.5,color:"var(--muted)",marginTop:4}}>プラスは実測が予測より多い（消費が少なめだった）／マイナスは予測より少ない（消費が多めだった）</div>
    </div>)}
    {rs.length===0&&<div style={S.empty}>該当する記録はまだありません。棚卸しを2回以上保存すると差分が記録されます。</div>}
    {rs.map((r,i)=>{ const it=items.find(x=>x.id===r.itemId); const fn=FARMS.find(x=>x.id===r.farmId)?.name||r.farmId;
      const sign=r.diffKg>=0?"+":""; const col=Math.abs(r.diffKg)<10?"var(--muted)":r.diffKg>=0?"var(--ok)":"var(--bad)"; const u=unitOf(it);
      return (<div key={i} style={S.diffRow}>
        <div style={S.diffHead}>
          <span style={{fontWeight:700,fontSize:14}}>{it?.name||"(削除済み)"}</span>
          <span style={{fontSize:12,color:"var(--muted)"}}>{fn} ・ {r.date}</span>
        </div>
        <div style={S.diffBody}>
          <span style={S.diffCell}>予測 <b>{fmt(Math.round(r.predictedKg))}</b>{u}</span>
          <span style={S.diffArrow}>→</span>
          <span style={S.diffCell}>実測 <b>{fmt(Math.round(r.actualKg))}</b>{u}</span>
          <span style={{...S.diffDelta,color:col}}>{sign}{fmt(Math.round(r.diffKg))}{u}{r.pctDiff!=null&&` (${sign}${fmt(r.pctDiff.toFixed(1))}%)`}</span>
        </div>
      </div>);
    })}
  </div>);
}

function QuickAddPanel({items, onAddOrder}){
  const [itemId,setItemId]=useState(items[0]?.id??null);
  const item=items.find(i=>i.id===itemId)||items[0];
  const [inputMode,setInputMode]=useState("manual"); // preset | manual
  const [presetId,setPresetId]=useState("");
  const [kg,setKg]=useState("0");
  const [eta,setEta]=useState(today());
  const [forFarm,setForFarm]=useState("shared");
  const [recent,setRecent]=useState([]); // 直近追加した発注（最大5件・UNDO付き）

  // 餌が変わった時にプリセット/農場の初期値を更新
  useEffect(()=>{
    if(!item) return;
    const presets=item.orderPresets||[];
    if(presets.length>0){ setInputMode("preset"); setPresetId(presets[0].id); }
    else { setInputMode("manual"); setPresetId(""); }
    const sm=stockModeOf(item);
    setForFarm(sm==="shared"?"shared":(item.farms[0]||"shared"));
    setKg("0");
  },[itemId]);

  if(!item) return <div style={S.empty}>餌が登録されていません。先に「設定」や「棚卸し」から餌を登録してください。</div>;

  const presets=item.orderPresets||[];
  const u=unitOf(item);
  const sm=stockModeOf(item);
  const opts=[{id:"shared",name:"共通(自動按分)"},...item.farms.map(f=>({id:f,name:FARMS.find(x=>x.id===f)?.name||f}))];
  const an=analyze(item);

  const submit=()=>{
    let k;
    if(inputMode==="preset"){ k=presets.find(x=>x.id===presetId)?.kg; }
    else k=parseFloat(kg);
    if(!k||k<=0||!eta){ alert("数量と入荷予定日を確認してください"); return; }
    onAddOrder(item.id,k,eta,forFarm);
    setRecent(r=>[{itemId:item.id,itemName:item.name,kg:k,eta,forFarm,at:Date.now()},...r].slice(0,5));
    // 入力欄をリセットして次の入力を促す
    setKg("0");
  };

  return (<div>
    <div style={S.quickPanel}>
      <label style={S.field}><span style={S.fieldLabel}>餌を選ぶ</span>
        <select style={{...S.select,fontSize:16}} value={itemId??""} onChange={e=>setItemId(Number(e.target.value))}>
          {items.map(it=>(<option key={it.id} value={it.id}>{it.name}{stockModeOf(it)==="shared"?"（共通）":""}</option>))}
        </select>
      </label>
      {/* 餌の現状を簡易表示（追加の目安になる） */}
      {an.totalUsage!=null&&(()=>{ const r=daysAndEndDate(an.monthsLeft); return (
        <div style={S.quickStatus}>
          📊 現在庫 {fmt(an.totalStock)}{u}{an.pendingKg>0&&` + 発注残${fmt(an.pendingKg)}${u}`} ・ 残り{r.days!=null?`${r.days}日 (${r.endLabel}まで)`:"—"}{an.suggestedOrder>0&&<span style={{color:"var(--bad)",fontWeight:700,marginLeft:8}}>追加目安 {fmt(an.suggestedOrder)}{u}</span>}
        </div>); })()}

      <div style={{...S.modeRow,marginTop:6}}>
        <button style={{...S.modeTab,...(inputMode==="preset"?S.modeActive:{}),opacity:presets.length===0?0.4:1}} onClick={()=>presets.length>0&&setInputMode("preset")} disabled={presets.length===0}>パターン</button>
        <button style={{...S.modeTab,...(inputMode==="manual"?S.modeActive:{})}} onClick={()=>setInputMode("manual")}>手入力</button>
      </div>
      {inputMode==="preset"?(presets.length?(
        <select style={S.select} value={presetId} onChange={e=>setPresetId(e.target.value)}>{presets.map(p=><option key={p.id} value={p.id}>{p.label}（{fmt(p.kg)}{u}）</option>)}</select>
      ):<div style={S.miniNote}>パターン未登録です。手入力をご利用ください。</div>):(
        <input style={{...S.input,fontSize:16}} type="number" inputMode="decimal" placeholder={`数量 ${u}（目安 ${fmt(an.suggestedOrder||0)}${u}）`} value={kg} onChange={e=>setKg(e.target.value)} onFocus={e=>e.target.select()}/>
      )}
      <div style={S.quickRow2}>
        <label style={{flex:1,minWidth:0}}><span style={S.fieldLabelSmall}>農場分</span>
          <select style={S.select} value={forFarm} onChange={e=>setForFarm(e.target.value)}>{opts.map(o=><option key={o.id} value={o.id}>{o.name}</option>)}</select>
        </label>
        <label style={{flex:1,minWidth:0}}><span style={S.fieldLabelSmall}>入荷予定日</span>
          <input style={S.input} type="date" value={eta} onChange={e=>setEta(e.target.value)}/>
        </label>
      </div>
      <button style={{...S.primaryBtn,marginTop:10}} onClick={submit}>＋ この内容で追加（連続入力できます）</button>
    </div>

    {recent.length>0&&(<div style={S.recentBox}>
      <div style={S.recentTitle}>✅ 直近で追加した発注 (この画面で)</div>
      {recent.map((r,i)=>{ const ffName=r.forFarm==="shared"?"共通":(FARMS.find(f=>f.id===r.forFarm)?.name||r.forFarm);
        return (<div key={i} style={S.recentRow}>
          <span style={S.recentTime}>{new Date(r.at).toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"})}</span>
          <span style={S.recentMain}>{r.itemName}・{fmt(r.kg)}{unitOf(items.find(it=>it.id===r.itemId)||{unitType:"kg"})} → {ffName}（入荷 {r.eta}）</span>
        </div>); })}
    </div>)}
  </div>);
}

            <div style={S.pendingActions}>
              <button style={S.copyMini} title="場所：餌名をコピー" onClick={async()=>{ const t=orderShortLabel(o); const ok=await copyToClipboard(t); if(ok) alert(`コピー: ${t}`); }}>📋</button>
              <button style={S.receivedBtn} onClick={()=>onToggleReceived(o.item.id,o.id)} title="入荷済みにする">✓</button>

               :<span style={{...S.badge,color:"var(--ok)",background:"rgba(95,125,60,.13)"}}>充分</span>}

          <div style={S.orderLine}><span style={S.orderLabel}>在庫日数</span>

function ByFarmPlanList({items, openId, setOpenId, onSelect, onAddOrder}){
  const [filter,setFilter]=useState("all"); // "all" | farmId
  const tabs=[{id:"all",name:"全農場"},...FARMS.map(f=>({id:f.id,name:f.name}))];
  const showFarms=filter==="all"?FARMS.map(f=>f.id):[filter];

  // 餌×表示中の農場のセルを作る（共通在庫モードは別タブなので除外）
  const itemRows=[];
  for(const it of items){
    if(stockModeOf(it)==="shared") continue;
    const byFarm=analyzeByFarm(it);
    if(!byFarm) continue;
    const cells=showFarms.map(fid=>it.farms.includes(fid)?{fid,b:byFarm[fid]}:null);
    if(cells.every(c=>!c)) continue;
    itemRows.push({it,cells});
  }
  // 残り日数が少ない順にソート（要発注を上に）
  itemRows.sort((a,b)=>{
    const am=Math.min(...a.cells.filter(c=>c&&c.b.monthsLeft!=null).map(c=>c.b.monthsLeft));
    const bm=Math.min(...b.cells.filter(c=>c&&c.b.monthsLeft!=null).map(c=>c.b.monthsLeft));
    const av=isFinite(am)?am:Infinity, bv=isFinite(bm)?bm:Infinity;
    return av-bv;
  });

  const colCount=showFarms.length;
  const isWide=colCount>=2;
  const gridStyle=isWide?{display:"grid",gridTemplateColumns:`repeat(${colCount},minmax(0,1fr))`,gap:10}:{display:"flex",flexDirection:"column",gap:10};
  const headerStyle={display:"grid",gridTemplateColumns:`repeat(${colCount},minmax(0,1fr))`,gap:10,marginBottom:6};

  return (<>
    <div style={S.farmRow}>
      {tabs.map(t=>(<button key={t.id} style={{...S.farmTab,...(filter===t.id?S.farmActive:{})}} onClick={()=>setFilter(t.id)}>{t.name}</button>))}
    </div>
    {isWide&&(<div style={headerStyle}>
      {showFarms.map(fid=>{ const fc=farmColor(fid); const fn=FARMS.find(f=>f.id===fid)?.name||fid;
        return <div key={fid} style={{...S.farmColHead,background:fc.tag,color:fc.accent}}>{fn}</div>; })}
    </div>)}
    {itemRows.length===0&&<div style={S.empty}>表示する餌はありません。</div>}
    {itemRows.map(({it,cells})=>(
      <div key={it.id} style={{marginBottom:10}}>
        <div style={gridStyle}>
          {cells.map((cell,idx)=>{
            if(!cell) return <div key={idx} style={S.emptyCell}>—</div>;
            const {fid,b}=cell;
            const u=unitOf(it);
            const need=b.suggested>0;
            const r=daysAndEndDate(b.monthsLeft);
            const fn=FARMS.find(f=>f.id===fid)?.name||fid;
            const fc=farmColor(fid);
            const key=`${it.id}-${fid}`;
            const isOpen=openId===key;
            return (<div key={key} style={{...S.card,background:fc.bg,borderLeft:`4px solid ${need?"var(--bad)":fc.accent}`,cursor:"default"}}>
              <div style={S.cardTop}>
                <button style={S.cardNameBtn} onClick={()=>onSelect(it.id)}>
                  {it.name}
                  <span style={{...S.farmTag,background:fc.tag,color:fc.accent}}>{fn}</span>
                </button>
                {need?<span style={{...S.badge,color:"var(--bad)",background:"rgba(168,73,47,.13)"}}>発注</span>
                     :<span style={{...S.badge,color:"var(--ok)",background:"rgba(95,125,60,.13)"}}>充分</span>}
              </div>
              {b.hasUsage?(<>
                <div style={S.orderLine}><span style={S.orderLabel}>在庫日数</span>
                  <span style={S.orderNum}>{r.days!=null?r.days:"—"}<span style={S.orderUnit}>日</span></span></div>
                <div style={S.cardMeta}>{r.endLabel?`${r.endLabel}まで持つ見込み`:""} ・ 在庫 {fmt(b.stock)}{u}{b.pending>0&&` ＋ 発注残 ${fmt(Math.round(b.pending))}${u}`} ・ 月消費 約{fmt(b.usage)}{u}</div>
              </>):<div style={S.cardMeta}>消費量未計算（在庫 {fmt(b.stock)}{u}）</div>}
              <button style={S.quickToggle} onClick={()=>setOpenId(isOpen?null:key)}>{isOpen?"閉じる":"＋ 発注を追加"}</button>
              {isOpen&&<QuickOrderForm item={it} suggested={b.suggested} defaultForFarm={fid} onAdd={(kg,eta,ff)=>{ onAddOrder(it.id,kg,eta,ff); setOpenId(null); }}/>}
            </div>);
          })}
        </div>
      </div>
    ))}
  </>);
}

function QuickOrderForm({item, suggested, defaultForFarm, onAdd}){
  const u=unitOf(item);
  const presets=item.orderPresets||[];
  const [inputMode,setInputMode]=useState(presets.length?"preset":"manual");
  const [presetId,setPresetId]=useState(presets[0]?.id??"");
  const [kg,setKg]=useState("0");
  const [eta,setEta]=useState(today());
  const sm=stockModeOf(item);
  const opts=[{id:"shared",name:sm==="shared"?"共通(自動按分)":"共通(自動按分)"},...item.farms.map(f=>({id:f,name:FARMS.find(x=>x.id===f)?.name||f}))];
  const [forFarm,setForFarm]=useState(defaultForFarm||opts[0].id);
  const submit=()=>{ let k; if(inputMode==="preset"){ k=presets.find(x=>x.id===presetId)?.kg; } else k=parseFloat(kg);
    if(!k||k<=0||!eta) return;
    onAdd(k,eta,forFarm);
  };
  return (<div style={S.quickForm}>
    <div style={S.quickRow}>
      <button style={{...S.miniTab,...(inputMode==="preset"?S.miniTabOn:{})}} onClick={()=>setInputMode("preset")} disabled={presets.length===0}>パターン</button>
      <button style={{...S.miniTab,...(inputMode==="manual"?S.miniTabOn:{})}} onClick={()=>setInputMode("manual")}>手入力</button>
    </div>
    {inputMode==="preset"?(presets.length?(
      <select style={S.select} value={presetId} onChange={e=>setPresetId(e.target.value)}>{presets.map(p=><option key={p.id} value={p.id}>{p.label}（{fmt(p.kg)}{u}）</option>)}</select>
    ):<div style={S.miniNote}>パターン未登録</div>):(
      <input style={S.input} type="number" inputMode="decimal" placeholder={`数量 ${u}（目安 ${fmt(suggested||0)}${u}）`} value={kg} onChange={e=>setKg(e.target.value)} onFocus={e=>e.target.select()}/>
    )}
    <div style={S.quickRow}>
      <label style={{flex:1}}><span style={S.fieldLabelSmall}>農場分</span>
        <select style={S.select} value={forFarm} onChange={e=>setForFarm(e.target.value)}>{opts.map(o=><option key={o.id} value={o.id}>{o.name}</option>)}</select>
      </label>
      <label style={{flex:1}}><span style={S.fieldLabelSmall}>入荷予定日</span>
        <input style={S.input} type="date" value={eta} onChange={e=>setEta(e.target.value)}/>
      </label>
    </div>
    <button style={S.quickSubmit} onClick={submit}>この内容で追加</button>
  </div>);
}

// ── 棚卸し ──────────────────────────────────────
function InventoryView({items,onSave,onAdd,onSelect}){
  const tabs=FARMS.map(f=>({id:f.id,name:f.name}));
  const [farm,setFarm]=useState(tabs[0]?.id||"a"); const [date,setDate]=useState(today());
  const [vals,setVals]=useState({});
  const [kgVals,setKgVals]=useState({});
  const [modes,setModes]=useState({});
  // この農場で使う餌（管理モード問わず）
  const farmItems=items.filter(i=>(i.farms||[]).includes(farm));
  const modeOf=(it)=>modes[it.id]||(it.units?.length?"count":"kg");
  const setMode=(id,m)=>setModes(s=>({...s,[id]:m}));
  const setQty=(id,uid,v)=>setVals(s=>({...s,[id]:{...(s[id]||{}),[uid]:v}}));
  const save=()=>{
    let n=0;
    for(const it of farmItems){
      const m=modeOf(it);
      if(m==="kg"){
        const v=kgVals[it.id];
        if(v!==undefined&&v!==""){ onSave(it.id,farm,date,{__kg:parseFloat(v)||0}); n++; }
      } else {
        const raw=vals[it.id]; if(!raw) continue; const q={}; let any=false;
        for(const u of (it.units||[])){ const v=raw[u.id]; if(v!==undefined&&v!==""){ q[u.id]=parseFloat(v)||0; any=true; } }
        if(any){ onSave(it.id,farm,date,q); n++; }
      }
    }
    if(n){ setVals({}); setKgVals({}); }
  };
  return (<div style={S.fade}>
    <div style={S.lead}>その日に見た在庫を入力します。共通在庫の餌も、農場ごとに数えて入力します(後で合算されます)。</div>
    <div style={S.farmRow}>{tabs.map(f=><button key={f.id} style={{...S.farmTab,...(farm===f.id?S.farmActive:{})}} onClick={()=>setFarm(f.id)}>{f.name}</button>)}</div>
    <label style={S.field}><span style={S.fieldLabel}>棚卸し日</span><input style={S.input} type="date" value={date} onChange={e=>setDate(e.target.value)}/></label>
    <h3 style={S.h3}>各餌の在庫</h3>
    {farmItems.length===0&&<div style={S.empty}>この農場の餌が未登録です。</div>}
    {farmItems.map(it=>{
      const counts=[...(it.counts?.[farm]||[])].sort((a,b)=>b.date.localeCompare(a.date)); const last=counts[0];
      const u=unitOf(it);
      const m=modeOf(it); const live=m==="kg"?(parseFloat(kgVals[it.id])||0):countToKg(it,vals[it.id]);
      const hasUnits=it.units?.length>0;
      const isShared=stockModeOf(it)==="shared";
      return (<div key={it.id} style={S.invCard}>
        <div style={S.invHead}><button style={S.invName} onClick={()=>onSelect(it.id)}>{it.name}{isShared&&<span style={S.sharedBadge}>共通</span>}</button>
          <span style={S.invLast}>{last?`前回 ${fmt(countToKg(it,last.qtys))}${u}`:"記録なし"}</span></div>
        {hasUnits&&(<div style={S.invModeRow}>
          <button style={{...S.invModeTab,...(m==="count"?S.invModeActive:{})}} onClick={()=>setMode(it.id,"count")}>個数(単位)</button>
          <button style={{...S.invModeTab,...(m==="kg"?S.invModeActive:{})}} onClick={()=>setMode(it.id,"kg")}>{u}直接</button>
        </div>)}
        {m==="kg"?(
          <div style={S.kgInputRow}>
            <input style={S.unitInput} type="number" inputMode="decimal" placeholder={u==="kg"?"例: 450":"例: 12"} value={kgVals[it.id]??""} onChange={e=>setKgVals(s=>({...s,[it.id]:e.target.value}))}/>
            <span style={{fontSize:14,color:"var(--muted)",marginLeft:6}}>{u}</span>
          </div>
        ):(
          <div style={S.unitGrid}>{(it.units||[]).map(x=>(<div key={x.id} style={S.unitCell}>
            <span style={S.unitLabel}>{x.label}<span style={S.unitKg}>{x.kg}{u}</span></span>
            <input style={S.unitInput} type="number" inputMode="decimal" placeholder="0" value={vals[it.id]?.[x.id]??""} onChange={e=>setQty(it.id,x.id,e.target.value)}/></div>))}</div>
        )}
        <div style={S.invKg}>合計 {fmt(live)} {u}</div>
      </div>); })}

  </div>);
}

        return (<div key={i} style={S.logRow}><span style={S.logDate}>{c.date}</span><span style={S.logDetail}>{detail||"—"}</span><span style={S.logQty}>{fmt(countToKg(item,c.qtys))} {u}</span></div>); })}

function Stat({label,value,highlight,hl}){ return (<div style={S.statBox}><div style={S.statLabel}>{label}</div><div style={{...S.statValue,color:highlight?(hl||"var(--bad)"):"var(--ink)"}}>{value}</div></div>); }

// ── カレンダー ──────────────────────────────────
function CalendarView({items}){
  const [mode,setMode]=useState("single"); // single | all
  const [itemId,setItemId]=useState(items[0]?.id??null);
  const item=items.find(i=>i.id===itemId)||items[0];
  // 個別表示: 共通モードは「合計」のみ、農場別モードは合計+各農場
  const singleScopeOpts=item?(stockModeOf(item)==="shared"?[{id:"all",name:"全農場合計"}]:[...item.farms.map(f=>({id:f,name:FARMS.find(x=>x.id===f)?.name})),{id:"all",name:"合計"}]):[];
  const [scope,setScope]=useState(item?(stockModeOf(item)==="shared"?"all":item.farms[0]):"all");
  // 全部表示: 合計/各農場/両方別
  const allScopeOpts=[{id:"all",name:"合計"},...FARMS.map(f=>({id:f.id,name:f.name})),{id:"both",name:"両方別"}];
  const [allScope,setAllScope]=useState("all");
  const [month,setMonth]=useState(thisMonth());
  // 全部表示で表示する餌の選択（デフォルトは全餌）
  const [shownItemIds,setShownItemIds]=useState(null); // null=全部
  useEffect(()=>{ if(!item) return; if(stockModeOf(item)==="shared"){ if(scope!=="all") setScope("all"); } else if(!item.farms.includes(scope)&&scope!=="all") setScope(item.farms[0]); },[itemId]);
  if(!item) return <div style={S.empty}>餌が登録されていません。</div>;
  const [Y,M]=month.split("-").map(Number);
  const shift=(d)=>{ let y=Y,m=M+d; if(m<1){m=12;y--;} if(m>12){m=1;y++;} setMonth(`${y}-${String(m).padStart(2,"0")}`); };
  return (<div style={S.fade}>
    <div style={S.lead} className="no-print">棚卸しを起点に、日々の消費と発注の入荷を見込んだ予想残量です。</div>
    <div style={S.modeRow} className="no-print">
      <button style={{...S.modeTab,...(mode==="single"?S.modeActive:{})}} onClick={()=>setMode("single")}>個別表示</button>
      <button style={{...S.modeTab,...(mode==="all"?S.modeActive:{})}} onClick={()=>setMode("all")}>全部表示</button>
    </div>
    {mode==="single"?(<>
      <select style={S.select} className="no-print" value={itemId??""} onChange={e=>setItemId(Number(e.target.value))}>{items.map(it=><option key={it.id} value={it.id}>{it.name}</option>)}</select>
      <div style={{...S.farmRow,marginTop:10}} className="no-print">{singleScopeOpts.map(o=><button key={o.id} style={{...S.farmTab,...(scope===o.id?S.farmActive:{})}} onClick={()=>setScope(o.id)}>{o.name}</button>)}</div>
    </>):(
      <div style={{...S.farmRow,marginTop:4}} className="no-print">{allScopeOpts.map(o=><button key={o.id} style={{...S.farmTab,...(allScope===o.id?S.farmActive:{})}} onClick={()=>setAllScope(o.id)}>{o.name}</button>)}</div>
    )}
    <div style={S.calHead}><button style={S.calNav} onClick={()=>shift(-1)} className="no-print">‹</button><span style={S.calTitle}>{Y}年{M}月 まきば在庫カレンダー</span><button style={S.calNav} onClick={()=>shift(1)} className="no-print">›</button></div>
    {mode==="single"
      ? <MonthGrid item={item} scope={scope} ymStr={month} large/>
      : <VerticalTable items={items} allScope={allScope} ymStr={month} shownItemIds={shownItemIds} onChangeShown={setShownItemIds}/>}
  </div>);
}

// 縦テーブル：行=日付、列=餌(×scope)
function VerticalTable({items,allScope,ymStr,shownItemIds,onChangeShown}){
  const [Y,M]=ymStr.split("-").map(Number);
  const dim=daysInMonth(Y,M);
  // 表示対象の餌
  const allItemIds=items.map(i=>i.id);
  const shown=shownItemIds===null?allItemIds:shownItemIds;
  // 列リスト = [{item, scope, label}]
  const cols=[];
  for(const it of items){
    if(!shown.includes(it.id)) continue;
    const sm=stockModeOf(it);
    if(sm==="shared"){
      // 共通在庫は合計1列で表示（scopeはall、simulateMonth内で合算される）
      cols.push({item:it, scope:"all", label:it.name, sub:"共通"});
    } else if(allScope==="all") cols.push({item:it, scope:"all", label:it.name, sub:""});
    else if(allScope==="both"){
      for(const fid of it.farms) cols.push({item:it, scope:fid, label:it.name, sub:FARMS.find(f=>f.id===fid)?.name});
    } else {
      if(it.farms.includes(allScope)) cols.push({item:it, scope:allScope, label:it.name, sub:""});
    }
  }
  const colSims=cols.map(c=>({...c, sim:simulateMonth(c.item, c.scope, ymStr)}));
  const days=Array.from({length:dim},(_,i)=>i+1);
  const todayStr=today();
  const toggleShown=(id)=>{ const cur=shown.includes(id)?shown.filter(x=>x!==id):[...shown,id]; onChangeShown(cur.length===items.length?null:cur); };

  // 印刷/PDF
  const onPrint=()=>{ window.print(); };

  // 各セル描画ヘルパー（トレンド↑↓も）
  const renderCell=(c,d,date,dow)=>{
    if(!c.sim) return <td key={c.item.id+"-"+c.scope} style={S.vtCell}>—</td>;
    const cell=c.sim.cells[d-1];
    if(!cell) return <td key={c.item.id+"-"+c.scope} style={S.vtCell}></td>;
    const prev=d>1?c.sim.cells[d-2]:null;
    const warn=c.sim.dailyUse*7;
    let col="var(--ink)", bg="transparent", w=400;
    if(cell.before){ col="var(--muted)"; }
    else if(cell.kg<=0){ col="var(--bad)"; bg="rgba(168,73,47,.16)"; w=700; }
    else if(cell.kg<=warn){ col="var(--warn)"; bg="rgba(201,143,42,.13)"; w=700; }
    else if(cell.anchor){ bg="rgba(95,125,60,.16)"; w=700; }
    // トレンド: 前日比
    let trend=null;
    if(!cell.before&&prev&&!prev.before&&prev.kg!=null){
      const diff=cell.kg-prev.kg;
      if(Math.abs(diff)<0.5) trend=null;
      else if(diff>0) trend={mark:"↑",col:"var(--ok)"};
      else trend={mark:"↓",col:"var(--muted)"};
    }
    return (<td key={c.item.id+"-"+c.scope} style={{...S.vtCell,color:col,background:bg,fontWeight:w}}>
      <span style={S.vtCellMain}>
        {cell.before?"":fmt(Math.round(cell.kg))}
        {trend&&<span style={{color:trend.col,marginLeft:3,fontSize:11}}>{trend.mark}</span>}
      </span>
      {cell.info&&<span style={S.vtArrival}>{cell.info.anyReceived&&!cell.info.anyPending?"✓":"📦"}+{fmt(Math.round(cell.info.kg))}</span>}
    </td>);
  };

  return (<div>
    {/* 餌の選択 */}
    <div style={S.itemFilterBox} className="no-print">
      <div style={S.itemFilterHeader}>
        <span style={S.itemFilterTitle}>表示する餌</span>
        <button style={S.printBtn} onClick={onPrint}>🖨 印刷/PDF</button>
      </div>
      <div style={S.itemFilterRow}>
        {items.map(it=>(<button key={it.id} style={{...S.itemFilterBtn,...(shown.includes(it.id)?S.itemFilterOn:{})}} onClick={()=>toggleShown(it.id)}>{it.name}</button>))}
      </div>
    </div>
    {colSims.length===0?<div style={S.empty}>表示する餌を選んでください。</div>:(
      <div style={S.vtWrap} className="vt-wrap">
        <table style={S.vtTable}>
          <thead>
            <tr>
              <th style={S.vtDateHead}>日付</th>
              {colSims.map((c,i)=>(<th key={i} style={S.vtColHead}>
                <div style={S.vtColName}>{c.label}</div>
                {c.sub&&<div style={S.vtColSub}>{c.sub}</div>}
                <div style={S.vtColUnit}>{unitOf(c.item)}</div>
              </th>))}
            </tr>
          </thead>
          <tbody>
            {days.map(d=>{
              const date=iso(Y,M,d);
              const dt=new Date(Y,M-1,d);
              const dow=dt.getDay();
              const isToday=date===todayStr;
              // 土日の薄色（行全体）
              const rowBg=dow===0?"rgba(168,73,47,.05)":dow===6?"rgba(58,110,165,.05)":"#fff";
              // 日付セルの濃色（土日も識別しやすく）
              const dateBg=dow===0?"rgba(168,73,47,.13)":dow===6?"rgba(58,110,165,.13)":"#fbf8ef";
              const dateCol=dow===0?"var(--bad)":dow===6?"#3a6ea5":"var(--ink)";
              return (<tr key={d} style={{background:rowBg}}>
                <td style={{...S.vtDate,background:dateBg,color:dateCol,fontWeight:isToday?900:700,boxShadow:isToday?"inset 0 0 0 2px var(--accent)":"none"}}>{d}</td>
                {colSims.map(c=>renderCell(c,d,date,dow))}
              </tr>);
            })}
          </tbody>
        </table>
      </div>
    )}
    <div style={S.legend} className="no-print">
      <span><i style={{background:"rgba(95,125,60,.5)"}}/>棚卸し日</span>
      <span><i style={{background:"rgba(201,143,42,.5)"}}/>残りわずか</span>
      <span><i style={{background:"rgba(168,73,47,.5)"}}/>在庫切れ</span>
      <span><i style={{background:"rgba(168,73,47,.1)"}}/>日曜</span>
      <span><i style={{background:"rgba(58,110,165,.1)"}}/>土曜</span>
      <span>📦 入荷予定 ／ ✓ 入荷済 ／ ↑↓ 前日比</span>
    </div>
  </div>);
}

function MonthGrid({item,scope,ymStr,large}){
  const sim=simulateMonth(item,scope,ymStr);
  const [Y,M]=ymStr.split("-").map(Number);
  const firstDow=new Date(Y,M-1,1).getDay();
  if(!sim) return <div style={S.empty}>棚卸し未入力</div>;
  const warn=sim.dailyUse*7; const u=unitOf(item);
  const cellStyle=large?S.dayCell:S.dayCellSmall;
  return (<div className={large?"cal-grid-wrap":""}>
    <div style={S.calGrid}>
      {Array.from({length:firstDow}).map((_,i)=><div key={"e"+i}/>)}
      {sim.cells.map(c=>{ const isT=c.date===today();
        const dow=new Date(c.date).getDay();
        let bg="var(--card)",col="var(--ink)";
        // 土日の薄い色付け（在庫色を上書きしないよう、優先順を整理）
        if(dow===0) bg="rgba(168,73,47,.06)";
        else if(dow===6) bg="rgba(58,110,165,.06)";
        if(c.before){bg="transparent";col="var(--muted)";}
        else if(c.kg<=0){bg="rgba(168,73,47,.16)";col="var(--bad)";}
        else if(c.kg<=warn){bg="rgba(201,143,42,.16)";col="var(--warn)";}
        else if(c.anchor){bg="rgba(95,125,60,.16)";}
        // 日付色（土日のみ）
        const dayCol=dow===0?"var(--bad)":dow===6?"#3a6ea5":"var(--muted)";
        const inf=c.info; return (<div key={c.day} style={{...cellStyle,background:bg,outline:isT?"2px solid var(--accent)":"none"}}>
          <span style={{...S.dayNum,fontSize:large?11:9,color:dayCol,fontWeight:dow===0||dow===6?700:400}}>{c.day}</span>
          {inf&&large&&<span style={{...S.arrowMark,color:inf.anyReceived&&!inf.anyPending?"var(--ok)":"var(--accent)"}}>{inf.anyReceived&&!inf.anyPending?"✓入荷":"📦入荷"}</span>}
          {inf&&!large&&<span style={{...S.arrowMark,color:inf.anyReceived&&!inf.anyPending?"var(--ok)":"var(--accent)",fontSize:8}}>📦</span>}
          <span style={{...S.dayKg,color:col,fontSize:large?12:9.5}}>{c.before?"":fmt(Math.round(c.kg))}</span>
          {inf&&large&&<span style={S.arrKg}>+{fmt(Math.round(inf.kg))}</span>}
        </div>); })}
    </div>
    {large&&(<>
      <div style={S.legend}><span><i style={{background:"rgba(95,125,60,.5)"}}/>棚卸し日</span><span><i style={{background:"rgba(201,143,42,.6)"}}/>残りわずか</span><span><i style={{background:"rgba(168,73,47,.6)"}}/>在庫切れ</span><span>📦 入荷予定 ／ ✓ 入荷済</span></div>
      <div style={S.note}>1日あたり消費 約{fmt(sim.dailyUse)}{u}。数値は各日の予想残量({u})。入荷マークは発注予定の入荷予定日に表示。</div>
    </>)}
  </div>);
}

function DataView({items,log,me,onSetMe,onApply,onClear,onSetExtra,onAddItem}){

    <h2 style={S.h2}>給餌Excelの取込</h2>

    <div style={S.nameLine}>あなたの名前: <b>{me||"未設定"}</b> <NameSetter onSet={onSetMe}/></div>

    {log.map((e,i)=>(<div key={i} style={S.logEntry}><span style={S.logWho}>{e.who}</span><span style={S.logWhat}>{e.what}</span><span style={S.logAt}>{new Date(e.at).toLocaleString("ja-JP",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"})}</span></div>))}

}
function ExtraFeed({items,onSetExtra}){
  const [itemId,setItemId]=useState(items[0]?.id??null);
  const [farm,setFarm]=useState("a");
  const item=items.find(i=>i.id===itemId)||items[0];
  const [kg,setKg]=useState("");
  const [memo,setMemo]=useState("");
  useEffect(()=>{ if(item&&!item.farms.includes(farm)) setFarm(item.farms[0]); },[itemId]);
  useEffect(()=>{ setKg(item?.extraDaily?.[farm]!=null?String(item.extraDaily[farm]):""); setMemo(item?.extraMemo?.[farm]||""); },[itemId,farm]);
  if(!item) return <div style={S.empty}>餌が登録されていません。</div>;
  return (<div style={S.importBox}>
    <div style={S.inlineRow}>
      <label style={S.colSel}>餌<select style={S.select} value={itemId??""} onChange={e=>setItemId(Number(e.target.value))}>{items.map(it=><option key={it.id} value={it.id}>{it.name}</option>)}</select></label>
      <label style={S.colSel}>農場<select style={S.select} value={farm} onChange={e=>setFarm(e.target.value)}>{item.farms.map(f=><option key={f} value={f}>{FARMS.find(x=>x.id===f)?.name}</option>)}</select></label>
    </div>
    <label style={S.field}><span style={S.fieldLabel}>1日あたりの別給与（{unitOf(item)}）</span>
      <input style={S.input} type="number" inputMode="decimal" placeholder={unitOf(item)==="kg"?"例: 5":"例: 0.5"} value={kg} onChange={e=>setKg(e.target.value)}/></label>
    <label style={S.field}><span style={S.fieldLabel}>備考（任意）</span>
      <input style={S.input} type="text" placeholder="例: 子牛のミルク追加分／病気の牛用 など" value={memo} onChange={e=>setMemo(e.target.value)}/></label>
    <button style={S.primaryBtn} onClick={()=>onSetExtra(item.id,farm,parseFloat(kg)||0,memo)}>保存する</button>
    <h3 style={S.h3}>設定済みの別給与</h3>
    {items.flatMap(it=>(it.farms||[]).filter(fid=>it.extraDaily?.[fid]>0).map(fid=>{ const u=unitOf(it); const m=it.extraMemo?.[fid]; return (
      <div key={it.id+fid} style={S.orderRow}><div style={S.orderInfo}>
        <span style={{fontWeight:700,fontSize:14}}>{it.name}・{FARMS.find(f=>f.id===fid)?.name}</span>
        <span style={S.orderEta}>1日 {fmt(it.extraDaily[fid])}{u}（月 約{fmt(it.extraDaily[fid]*30)}{u}）{m&&<span style={{color:"var(--accent)",marginLeft:6}}>📝 {m}</span>}</span></div>
        <button style={S.miniDel} onClick={()=>onSetExtra(it.id,fid,0,"")}>×</button></div>); }))}
    {items.every(it=>!(it.farms||[]).some(fid=>it.extraDaily?.[fid]>0))&&<div style={S.empty}>まだ別給与の設定はありません。</div>}
  </div>);
}
function ExcelImport({items,onApply,onClear,onAddItem}){
  const [importMode,setImportMode]=useState("hirayama"); // hirayama | generic
  const [useRecent,setUseRecent]=useState(true); // true=直近15日平均、false=全期間平均
  const [sheets,setSheets]=useState(null); const [sheetName,setSheetName]=useState("");
  const [farm,setFarm]=useState("a"); const [itemId,setItemId]=useState(items[0]?.id??null);
  const [dateCol,setDateCol]=useState(0); const [kgCol,setKgCol]=useState(1); const [headerRow,setHeaderRow]=useState(true); const [msg,setMsg]=useState("");
  const [hirayamaResults,setHirayamaResults]=useState(null); // { farmId: { feedName: {dailyKg, total, from, to, days, rows} } }
  const [hirayamaDebug,setHirayamaDebug]=useState(null);
  const [sheetFarmOverride,setSheetFarmOverride]=useState(null); // null=自動、{sheetName:farmId} or skip
  const [showDebug,setShowDebug]=useState(false);
  const [selectedTargets,setSelectedTargets]=useState({}); // key="farm|feedname" -> itemId(target) or "new"

  const onFile=async(e)=>{ const f=e.target.files?.[0]; if(!f) return; try{
    const buf=await f.arrayBuffer();
    const wb=XLSX.read(buf,{cellDates:true});
    const obj={}; for(const nm of wb.SheetNames) obj[nm]=XLSX.utils.sheet_to_json(wb.Sheets[nm],{header:1,raw:false,dateNF:"yyyy-mm-dd"});
    setSheets(obj); setSheetName(wb.SheetNames[0]); setMsg("");
    setSheetFarmOverride(null);
    if(importMode==="hirayama") parseHirayama(obj);
  }catch(err){ setMsg("読み込み失敗: "+err.message); } };

  // 平山牧場フォーマット解析
  function parseHirayama(sheets, sheetFarmOverride){
    // 農場対応: FARMSの名前を見てシートを自動マッチ。手動マッピング(sheetFarmOverride)があれば優先。
    // sheetFarmOverride: { sheetName: farmId } の形式
    const farmMap=FARMS.map(f=>({keywords:[f.name],farmId:f.id,farmName:f.name}));
    const results={};
    let foundAny=false;
    const debugSheets=Object.keys(sheets);
    const debug=[]; // 各シートの解析結果(画面表示用)

    // どのシートをどの農場に割り当てるか決める
    const assignment=[]; // {sheetName, farmId, farmName}
    if(sheetFarmOverride){
      for(const [sheetName,farmId] of Object.entries(sheetFarmOverride)){
        if(farmId==="skip") continue;
        const farm=FARMS.find(f=>f.id===farmId); if(!farm) continue;
        assignment.push({sheetName, farmId, farmName:farm.name});
      }
    } else {
      // 自動: 各農場名を含むシートを探す
      for(const {keywords, farmId, farmName} of farmMap){
        const sheetName=debugSheets.find(nm=>{
          const norm=String(nm).replace(/\s/g,"").trim();
          return keywords.some(k=>norm.includes(k));
        });
        if(sheetName) assignment.push({sheetName, farmId, farmName});
      }
    }

    for(const {sheetName, farmId, farmName} of assignment){
      const sheetDebug={sheetName, farmId, farmName, totalRows:0, dateRow:null, dateCount:0, dateFromTo:null, sections:[], feeds:[], excluded:[]};
      debug.push(sheetDebug);
      const rows=sheets[sheetName]; if(!rows){ sheetDebug.error="シートが読み込めません"; continue; }
      sheetDebug.totalRows=rows.length;

      const isDateLike=(v)=>{
        if(v==null) return null;
        if(v instanceof Date) return v.toISOString().slice(0,10);
        const s=String(v).trim();
        if(/^\d{4}[-/]\d{1,2}[-/]\d{1,2}/.test(s)){ const d=new Date(s); if(!isNaN(d)) return d.toISOString().slice(0,10); }
        if(/^\d{1,2}\/\d{1,2}\/\d{2,4}/.test(s)){ const d=new Date(s); if(!isNaN(d)) return d.toISOString().slice(0,10); }
        return null;
      };
      let dateRow=-1, dateStartCol=2;
      for(let r=0;r<Math.min(rows.length,30);r++){
        const row=rows[r]||[]; let dc=0, firstC=-1;
        for(let c=0;c<Math.min(row.length,60);c++){
          if(isDateLike(row[c])){ dc++; if(firstC<0) firstC=c; }
        }
        if(dc>=3){ dateRow=r; dateStartCol=firstC; break; }
      }
      if(dateRow<0){ sheetDebug.error="日付行が見つかりませんでした（最初の30行で日付らしき値が3つ以上並ぶ行が必要）"; continue; }
      const dates=[]; const dateCols=[];
      for(let c=dateStartCol;c<rows[dateRow].length;c++){
        const d=isDateLike(rows[dateRow][c]);
        if(d){ dateCols.push(c); dates.push(d); }
      }
      sheetDebug.dateRow=dateRow+1; // 人間向けに1始まり
      sheetDebug.dateCount=dates.length;
      sheetDebug.dateFromTo=dates.length>0?`${dates[0]}〜${dates[dates.length-1]}`:null;

      // 餌セクション開始行
      const sectionStarts=[];
      for(let r=0;r<rows.length;r++){
        const v=rows[r]?.[0]; if(!v) continue;
        const s=String(v);
        if(s.includes("エサ使用量")&&!s.includes("残餌")) sectionStarts.push({row:r, label:s.trim()});
      }
      if(sectionStarts.length===0){ sheetDebug.error="「エサ使用量」を含むセクション見出しが見つかりませんでした"; continue; }
      const ranges=sectionStarts.map((s,i)=>({startRow:s.row+1, endRow:(sectionStarts[i+1]?.row||rows.length), label:s.label}));
      sheetDebug.sections=ranges.map(r=>({label:r.label, startRow:r.startRow+1, endRow:r.endRow}));

      const isNotFeed=(s)=>{
        if(s.includes("使用量")) return "「使用量」を含む";
        if(s.includes("合計")) return "「合計」を含む";
        if(s.includes("平均")) return "「平均」を含む";
        if(s.includes("乾物")) return "「乾物」を含む";
        if(s.includes("残餌")) return "「残餌」を含む";
        if(s.includes("ロボ配合平均")) return "ロボ配合平均";
        if(s.includes("TMR")||s.includes("ＴＭR")||s.includes("ＴＭＲ")) return "TMR";
        if(s.includes("割合")) return "「割合」を含む";
        if(s.includes("率")) return "「率」を含む";
        if(s.includes("頭数")) return "「頭数」を含む";
        if(s.includes("群")) return "「群」を含む";
        if(s==="水"||s==="塩ブロック") return "除外名";
        if(s.includes("ロール")) return "「ロール」を含む";
        if(s.includes("ブロック")) return "「ブロック」を含む";
        return null;
      };

      const feedDaily={};
      for(const r of ranges){
        for(let row=r.startRow;row<r.endRow;row++){
          const name=rows[row]?.[0]; if(!name) continue;
          const ns=String(name).trim(); if(!ns) continue;
          const reason=isNotFeed(ns);
          if(reason){ sheetDebug.excluded.push({row:row+1, name:ns, reason}); continue; }
          let rowTotal=0, rowDays=0;
          for(let i=0;i<dateCols.length;i++){
            const c=dateCols[i]; const v=rows[row][c];
            const num=typeof v==="number"?v:parseFloat(v);
            if(!isNaN(num)&&num>0){
              if(!feedDaily[ns]) feedDaily[ns]={};
              feedDaily[ns][dates[i]]=(feedDaily[ns][dates[i]]||0)+num;
              rowTotal+=num; rowDays++;
            }
          }
          // 検出された餌行（複数同名が出る場合は1つにまとめる）
          const exist=sheetDebug.feeds.find(f=>f.name===ns);
          if(exist){ exist.rows.push(row+1); exist.total+=rowTotal; exist.days+=rowDays; }
          else sheetDebug.feeds.push({name:ns, rows:[row+1], total:rowTotal, days:rowDays});
        }
      }

      const farmRes={};
      for(const [name,daily] of Object.entries(feedDaily)){
        const ds=Object.keys(daily).filter(d=>daily[d]>0).sort();
        if(ds.length===0) continue;
        const total=ds.reduce((s,d)=>s+daily[d],0);
        const from=ds[0], to=ds[ds.length-1];
        const dailyKgAll=total/ds.length;
        const cut=new Date(new Date(to)-14*86400000).toISOString().slice(0,10);
        const recentDs=ds.filter(d=>d>=cut);
        const recentTotal=recentDs.reduce((s,d)=>s+daily[d],0);
        const dailyKgRecent=recentDs.length>0?recentTotal/recentDs.length:dailyKgAll;
        farmRes[name]={dailyKgAll, dailyKgRecent, total, recentTotal, recentDays:recentDs.length, from, to, days:ds.length, rows:ds.length, recentFrom:recentDs[0]||from};
      }
      if(Object.keys(farmRes).length>0){ results[farmId]=farmRes; foundAny=true; }
    }
    setHirayamaDebug({sheets:debugSheets, assignment, perSheet:debug});
    if(!foundAny){ setMsg(`「${FARMS.map(f=>f.name).join("」「")}」に対応するシートが見つからないか、日付行が認識できませんでした。読み込めたシート: ${debugSheets.join(" / ")}。手動マッピングを試すか、開発者にこのメッセージを伝えてください。`); setHirayamaResults(null); return; }
    setHirayamaResults(results);
    const targets={};
    for(const [fid,feeds] of Object.entries(results)){
      for(const feedName of Object.keys(feeds)){
        const match=items.find(it=>it.name===feedName||it.name.includes(feedName)||feedName.includes(it.name));
        targets[`${fid}|${feedName}`]=match?match.id:"new";
      }
    }
    setSelectedTargets(targets);
  }

  const applyAll=()=>{
    if(!hirayamaResults) return;
    let n=0,added=0;
    // newのものは先に追加。同名が複数農場にあれば1回だけ追加。
    const toAdd=new Set();
    for(const [fid,feeds] of Object.entries(hirayamaResults)){
      for(const feedName of Object.keys(feeds)){
        if(selectedTargets[`${fid}|${feedName}`]==="new") toAdd.add(feedName);
      }
    }
    // まず追加してitemIdを取り戻すのは難しいので、追加と反映を別パスに。
    // ここは「new」のものは追加だけして、反映は次回ボタンで、という割り切り。
    if(toAdd.size>0){
      // どの農場で使うかを集計
      for(const feedName of toAdd){
        const farms=[];
        for(const [fid,feeds] of Object.entries(hirayamaResults)){ if(feeds[feedName]) farms.push(fid); }
        onAddItem({name:feedName,unitType:"kg",reserveMonths:0.5,farms,units:[]});
        added++;
      }
    }
    // 既存への反映
    for(const [fid,feeds] of Object.entries(hirayamaResults)){
      for(const [feedName,info] of Object.entries(feeds)){
        const t=selectedTargets[`${fid}|${feedName}`];
        if(t!=="new"&&t!=="skip"&&t!=null&&typeof t==="number"){
          const dailyKg=useRecent?info.dailyKgRecent:info.dailyKgAll;
          const days=useRecent?info.recentDays:info.days;
          const from=useRecent?info.recentFrom:info.from;
          onApply(t,fid,{dailyKg, from, to:info.to, days, total:useRecent?info.recentTotal:info.total, rows:info.rows});
          n++;
        }
      }
    }
    if(added>0) setMsg(`新規餌${added}件を登録しました。もう一度「すべて反映」を押すと、その分も消費量に反映されます（${n}件を反映済み）。`);
    else setMsg(`${n}件の消費量を反映しました。`);
  };

  // 汎用モードの計算
  const rows=sheets?.[sheetName]||[]; const preview=rows.slice(0,6); const colCount=Math.max(0,...rows.slice(0,10).map(r=>r.length||0)); const colOpts=Array.from({length:colCount},(_,i)=>i);
  const toDate=(v)=>{ if(v==null) return null; if(v instanceof Date) return v.toISOString().slice(0,10); const d=new Date(String(v).trim()); return isNaN(d)?null:d.toISOString().slice(0,10); };
  const compute=()=>{
    const data=headerRow?rows.slice(1):rows;
    const rowsArr=[]; // {date, kg}
    for(const r of data){ const d=toDate(r[dateCol]); const kg=parseFloat(String(r[kgCol]).replace(/[^0-9.\-]/g,"")); if(d&&!isNaN(kg)&&kg>0) rowsArr.push({date:d,kg}); }
    if(rowsArr.length===0) return null;
    rowsArr.sort((a,b)=>a.date.localeCompare(b.date));
    const from=rowsArr[0].date, to=rowsArr[rowsArr.length-1].date;
    const total=rowsArr.reduce((s,r)=>s+r.kg,0);
    const dailyKgAll=total/rowsArr.length;
    const cut=new Date(new Date(to)-14*86400000).toISOString().slice(0,10);
    const recentRows=rowsArr.filter(r=>r.date>=cut);
    const recentTotal=recentRows.reduce((s,r)=>s+r.kg,0);
    const dailyKgRecent=recentRows.length>0?recentTotal/recentRows.length:dailyKgAll;
    const dailyKg=useRecent?dailyKgRecent:dailyKgAll;
    return {dailyKg, dailyKgAll, dailyKgRecent, from, to:to, days:useRecent?recentRows.length:rowsArr.length, total:useRecent?recentTotal:total, rows:rowsArr.length, recentDays:recentRows.length};
  };
  const result=sheets&&importMode==="generic"?compute():null; const item=items.find(i=>i.id===itemId);
  const colLabel=(c)=>{ const h=headerRow&&rows[0]?.[c]!=null?String(rows[0][c]):""; return `列${c+1}${h?"："+h:""}`; };

  return (<div>
    <div style={S.modeRow}>
      <button style={{...S.modeTab,...(importMode==="hirayama"?S.modeActive:{})}} onClick={()=>setImportMode("hirayama")}>平山牧場フォーマット</button>
      <button style={{...S.modeTab,...(importMode==="generic"?S.modeActive:{})}} onClick={()=>setImportMode("generic")}>汎用(列を選ぶ)</button>
    </div>
    <div style={{...S.miniNote,marginBottom:10}}>
      {importMode==="hirayama"
        ? "「赤坂入力」「本場入力」シートの『エサ使用量』『搾乳エサ使用量』『DRYエサ使用量』『未経産エサ使用量』を自動で見つけて、餌ごとに合算します。"
        : "1シートにつき「日付の列」と「kgの列」を選んで集計します。"}
    </div>
    <label style={S.uploadBtn}>Excelファイルを選択<input type="file" accept=".xlsx,.xls,.csv" style={{display:"none"}} onChange={onFile}/></label>
    {msg&&<div style={{...S.miniNote,color:msg.includes("失敗")?"var(--bad)":"var(--ok)"}}>{msg}</div>}

    {/* 手動マッピング: シート→農場の対応をユーザーが変更可能に */}
    {importMode==="hirayama"&&sheets&&hirayamaDebug&&(<div style={S.importBox}>
      <h3 style={{...S.h3,marginTop:0}}>シートと農場の対応</h3>
      <div style={S.miniNote}>自動的にシート名から農場を判定しています。間違っている場合は手動で変更してください。</div>
      {Object.keys(sheets).map(sname=>{
        const current=sheetFarmOverride?(sheetFarmOverride[sname]||"skip"):(hirayamaDebug.assignment.find(a=>a.sheetName===sname)?.farmId||"skip");
        return (<div key={sname} style={S.mapRow}>
          <span style={S.mapSheet}>{sname}</span>
          <select style={S.select} value={current} onChange={e=>{
            const v=e.target.value;
            const next={...(sheetFarmOverride||{})};
            // 初回オーバーライド時、自動結果を初期値として継承
            if(!sheetFarmOverride){ for(const a of hirayamaDebug.assignment) next[a.sheetName]=a.farmId; }
            next[sname]=v;
            setSheetFarmOverride(next);
            parseHirayama(sheets, next);
          }}>
            <option value="skip">— 取込まない —</option>
            {FARMS.map(f=><option key={f.id} value={f.id}>{f.name}</option>)}
          </select>
        </div>);
      })}
    </div>)}

    {/* デバッグ表示 */}
    {importMode==="hirayama"&&hirayamaDebug&&(<div style={S.importBox}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}} onClick={()=>setShowDebug(v=>!v)}>
        <h3 style={{...S.h3,marginTop:0,marginBottom:0}}>🔍 解析の詳細（シート別の読み取り内容）</h3>
        <button style={S.smallGhost}>{showDebug?"閉じる":"開く"}</button>
      </div>
      {showDebug&&(<div style={{marginTop:10}}>
        {hirayamaDebug.perSheet.length===0&&<div style={S.miniNote}>解析対象のシートがありません。</div>}
        {hirayamaDebug.perSheet.map((d,i)=>(<div key={i} style={S.dbgSheet}>
          <div style={S.dbgSheetHead}><b>{d.sheetName}</b> → <span style={{color:"var(--accent)"}}>{d.farmName}</span> <span style={{color:"var(--muted)",fontSize:12}}>(全{d.totalRows}行)</span></div>
          {d.error?<div style={{color:"var(--bad)",fontSize:12.5,padding:"4px 0"}}>⚠ {d.error}</div>:(<>
            <div style={S.dbgStat}>日付行: <b>{d.dateRow}行目</b> ／ 日付数: <b>{d.dateCount}</b> {d.dateFromTo&&<span style={{color:"var(--muted)"}}>({d.dateFromTo})</span>}</div>
            <div style={S.dbgStat}>餌セクション: {d.sections.map((s,j)=><span key={j} style={S.dbgSection}>{s.label}（{s.startRow}〜{s.endRow}行）</span>)}</div>
            <details style={{marginTop:6}}>
              <summary style={{fontSize:13,fontWeight:700,cursor:"pointer"}}>取り込んだ餌 ({d.feeds.length}個)</summary>
              <div style={{paddingLeft:8,marginTop:4}}>
                {d.feeds.map((f,j)=>(<div key={j} style={S.dbgFeedRow}>
                  <span style={{fontWeight:700}}>{f.name}</span>
                  <span style={{color:"var(--muted)",fontSize:11.5,marginLeft:8}}>行{f.rows.join(",")} ・ 入力{f.days}日 ・ 計{fmt(Math.round(f.total))}kg</span>
                </div>))}
                {d.feeds.length===0&&<div style={{color:"var(--bad)",fontSize:12.5}}>餌として取り込まれた行がありません</div>}
              </div>
            </details>
            {d.excluded.length>0&&(<details style={{marginTop:6}}>
              <summary style={{fontSize:13,fontWeight:700,cursor:"pointer",color:"var(--muted)"}}>除外された行 ({d.excluded.length}個)</summary>
              <div style={{paddingLeft:8,marginTop:4}}>
                {d.excluded.map((e,j)=>(<div key={j} style={S.dbgExclRow}>
                  <span>{e.row}行目: {e.name}</span>
                  <span style={{color:"var(--muted)",fontSize:11.5,marginLeft:8}}>({e.reason})</span>
                </div>))}
              </div>
            </details>)}
          </>)}
        </div>))}
      </div>)}
    </div>)}

    {importMode==="hirayama"&&hirayamaResults&&(<div style={S.importBox}>
      <h3 style={{...S.h3,marginTop:0}}>自動検出された餌</h3>
      <div style={S.miniNote}>取込先の餌を選んでください。「(新規登録)」を選ぶと、新しい餌としてアプリに追加されます。同じ餌名が両農場に出ている場合、両方の農場に紐づきます。</div>
      <div style={{...S.modeRow,marginTop:10}}>
        <button style={{...S.modeTab,...(useRecent?S.modeActive:{})}} onClick={()=>setUseRecent(true)}>直近15日の平均</button>
        <button style={{...S.modeTab,...(!useRecent?S.modeActive:{})}} onClick={()=>setUseRecent(false)}>全期間の平均</button>
      </div>
      <div style={{...S.miniNote,marginTop:4}}>{useRecent?"直近15日のうち入力のある日だけの平均。未入力の日(0や空欄)は計算から省きます。":"取り込んだ全期間で入力のある日の平均。未入力の日は計算から省きます。"}</div>
      {Object.entries(hirayamaResults).map(([fid,feeds])=>(<div key={fid} style={{marginTop:14}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:6,color:"var(--accent)"}}>{FARMS.find(f=>f.id===fid)?.name}</div>
        {Object.entries(feeds).sort((a,b)=>b[1].total-a[1].total).map(([feedName,info])=>{
          const key=`${fid}|${feedName}`;
          return (<div key={key} style={S.hyRow}>
            <div style={S.hyName}>{feedName}</div>
            <div style={S.hyStat}>1日 <b>{fmt(useRecent?info.dailyKgRecent:info.dailyKgAll)}</b>kg<span style={{color:"var(--muted)"}}>（{useRecent?`直近15日のうち入力${info.recentDays}日`:`入力ありの${info.days}日`} 計{fmt(Math.round(useRecent?info.recentTotal:info.total))}kg）</span></div>
            <select style={S.hyTarget} value={selectedTargets[key]||"new"} onChange={e=>{const v=e.target.value; setSelectedTargets(s=>({...s,[key]:(v==="new"||v==="skip")?v:Number(v)}));}}>
              <option value="new">→ 新規登録</option>
              {items.map(it=><option key={it.id} value={it.id}>→ {it.name}</option>)}
              <option value="skip">→ 取込まない</option>
            </select>
          </div>);
        })}
      </div>))}
      <button style={{...S.primaryBtn,marginTop:14}} onClick={applyAll}>すべて反映する</button>
    </div>)}

    {importMode==="generic"&&sheets&&(<div style={S.importBox}>
      <label style={S.field}><span style={S.fieldLabel}>シート</span>
        <select style={S.select} value={sheetName} onChange={e=>setSheetName(e.target.value)}>{Object.keys(sheets).map(nm=><option key={nm} value={nm}>{nm}</option>)}</select></label>
      <div style={S.previewWrap}><table style={S.previewTable}><tbody>{preview.map((r,ri)=>(<tr key={ri}>{colOpts.map(ci=><td key={ci} style={{...S.previewCell,fontWeight:ri===0&&headerRow?700:400}}>{r[ci]!=null?String(r[ci]):""}</td>)}</tr>))}</tbody></table></div>
      <label style={S.checkRow}><input type="checkbox" checked={headerRow} onChange={e=>setHeaderRow(e.target.checked)}/> 1行目は見出し</label>
      <div style={S.field}><span style={S.fieldLabel}>列の対応づけ</span><div style={S.inlineRow}>
        <label style={S.colSel}>日付の列<select style={S.select} value={dateCol} onChange={e=>setDateCol(Number(e.target.value))}>{colOpts.map(c=><option key={c} value={c}>{colLabel(c)}</option>)}</select></label>
        <label style={S.colSel}>kgの列<select style={S.select} value={kgCol} onChange={e=>setKgCol(Number(e.target.value))}>{colOpts.map(c=><option key={c} value={c}>{colLabel(c)}</option>)}</select></label></div></div>
      <div style={S.inlineRow}>
        <label style={S.colSel}>取込先の餌<select style={S.select} value={itemId??""} onChange={e=>setItemId(Number(e.target.value))}>{items.map(it=><option key={it.id} value={it.id}>{it.name}</option>)}</select></label>
        <label style={S.colSel}>農場<select style={S.select} value={farm} onChange={e=>setFarm(e.target.value)}>{FARMS.map(f=><option key={f.id} value={f.id}>{f.name}</option>)}</select></label></div>
      <div style={{...S.modeRow,marginTop:6}}>
        <button style={{...S.modeTab,...(useRecent?S.modeActive:{})}} onClick={()=>setUseRecent(true)}>直近15日の平均</button>
        <button style={{...S.modeTab,...(!useRecent?S.modeActive:{})}} onClick={()=>setUseRecent(false)}>全期間の平均</button>
      </div>
      {result?(<div style={S.resultBox}><div><b>{result.rows}</b>件・{result.from}〜{result.to}（全{Math.round((new Date(result.to)-new Date(result.from))/86400000)+1}日 / 直近15日{result.recentDays>0?"あり":"なし"}）</div><div>1日あたり <b>{fmt(result.dailyKg)}{unitOf(item)}</b> ({useRecent?"直近15日":"全期間"}基準)</div></div>):<div style={S.miniNote}>日付・値の列を正しく選ぶと結果が出ます。</div>}
      <button style={{...S.primaryBtn,opacity:result?1:0.5}} disabled={!result} onClick={()=>{ onApply(itemId,farm,result); setMsg(`${item?.name}（${FARMS.find(f=>f.id===farm)?.name}）に反映しました。`); }}>この消費量を反映する</button>
    </div>)}

    <h3 style={S.h3}>取込済みの消費量</h3>
    {items.flatMap(it=>(it.farms||[]).filter(fid=>it.feedDaily?.[fid]).map(fid=>{ const fd=it.feedDaily[fid]; const u=unitOf(it); return (
      <div key={it.id+fid} style={S.orderRow}><div style={S.orderInfo}><span style={{fontWeight:700,fontSize:14}}>{it.name}・{FARMS.find(f=>f.id===fid)?.name}</span><span style={S.orderEta}>1日 {fmt(fd.dailyKg)}{u}（{fd.from}〜{fd.to}）</span></div><button style={S.miniDel} onClick={()=>onClear(it.id,fid)}>×</button></div>); }))}
    {items.every(it=>!(it.farms||[]).some(fid=>it.feedDaily?.[fid]))&&<div style={S.empty}>まだ取込済みの消費量はありません（棚卸し差から推定中）。</div>}
  </div>);
}

// ── 餌追加 ──────────────────────────────────────
function ItemForm({initial,onSave,onCancel,title}){
  const [name,setName]=useState(initial?.name||"");
  const [unitType,setUnitType]=useState(initial?.unitType||"kg");
  const [stockMode,setStockMode]=useState(initial?.stockMode==="shared"?"shared":"split");
  const [reserve,setReserve]=useState(String(initial?.reserveMonths??"0.5"));
  const [farms,setFarms]=useState(initial?.farms?initial.farms.slice():["a","b"]);
  const [units,setUnits]=useState(initial?.units?initial.units.map(u=>({id:u.id,label:u.label,kg:String(u.kg)})):[{id:"u1",label:"",kg:""}]);
  const toggleFarm=(fid)=>setFarms(s=>s.includes(fid)?s.filter(x=>x!==fid):[...s,fid]);
  const setUnit=(i,k,v)=>setUnits(s=>s.map((u,idx)=>idx===i?{...u,[k]:v}:u));
  const addUnit=()=>setUnits(s=>[...s,{id:"u"+Date.now(),label:"",kg:""}]); const rmUnit=(i)=>setUnits(s=>s.filter((_,idx)=>idx!==i));
  const clean=units.filter(u=>u.label.trim()&&parseFloat(u.kg)>0).map(u=>({id:u.id,label:u.label.trim(),kg:parseFloat(u.kg)}));
  const ok=name.trim()&&farms.length>0;
  const uLabel=unitType==="piece"?"個":"kg";
  return (<div style={S.fade}>
    <button style={S.back} onClick={onCancel}>← 戻る</button>
    <h2 style={S.h2}>{title||"餌を追加"}</h2>
    <label style={S.field}><span style={S.fieldLabel}>名称</span><input style={S.input} value={name} onChange={e=>setName(e.target.value)} placeholder="例: チモシー乾草"/></label>
    <div style={S.field}><span style={S.fieldLabel}>管理単位</span>
      <div style={S.modeRow}>
        <button style={{...S.modeTab,...(unitType==="kg"?S.modeActive:{})}} onClick={()=>setUnitType("kg")}>kg管理</button>
        <button style={{...S.modeTab,...(unitType==="piece"?S.modeActive:{})}} onClick={()=>setUnitType("piece")}>個数管理</button>
      </div>
      <div style={{...S.miniNote,marginTop:4}}>{unitType==="kg"?"重さ(kg)で消費・発注を計算します。牧草・配合飼料など。":"個数で消費・発注を計算します。ミネラルブロックなど。"}</div>
    </div>
    <div style={S.field}><span style={S.fieldLabel}>在庫管理</span>
      <div style={S.modeRow}>
        <button style={{...S.modeTab,...(stockMode==="split"?S.modeActive:{})}} onClick={()=>setStockMode("split")}>農場別在庫</button>
        <button style={{...S.modeTab,...(stockMode==="shared"?S.modeActive:{})}} onClick={()=>setStockMode("shared")}>共通在庫</button>
      </div>
      <div style={{...S.miniNote,marginTop:4}}>{stockMode==="split"?"農場ごとに在庫・発注を分けて管理します。基本はこちら。":"各農場で棚卸しは入力しますが、合算して見ます。発注計画も合計で立てます。両農場で同じ餌を使い、まとめて発注するときに便利です。"}</div>
    </div>
    <div style={S.field}><span style={S.fieldLabel}>使用する農場</span><div style={S.farmRow}>{FARMS.map(x=><button key={x.id} style={{...S.farmTab,...(farms.includes(x.id)?S.farmActive:{})}} onClick={()=>toggleFarm(x.id)}>{x.name}</button>)}</div></div>
    <div style={S.field}><span style={S.fieldLabel}>単位パターン（数える単位と1個あたり{uLabel}・空欄でも可）</span>
      {units.map((u,i)=>(<div key={u.id} style={S.unitEditRow}>
        <input style={{...S.input,flex:1.4}} placeholder={unitType==="kg"?"ロール / コンテナ など":"箱 / ブロック など"} value={u.label} onChange={e=>setUnit(i,"label",e.target.value)}/>
        <input style={{...S.input,flex:1}} type="number" inputMode="decimal" placeholder={uLabel} value={u.kg} onChange={e=>setUnit(i,"kg",e.target.value)}/>
        {units.length>1&&<button style={S.rmBtn} onClick={()=>rmUnit(i)}>×</button>}</div>))}
      <button style={S.smallGhost} onClick={addUnit}>＋ パターンを追加</button>
      {clean.length===0&&<div style={{...S.miniNote,marginTop:6}}>単位パターン未登録の場合、棚卸し画面では「{uLabel}直接入力」だけが使えます。</div>}
    </div>
    <label style={S.field}><span style={S.fieldLabel}>安全在庫（翌月棚卸しに加えて確保する月数）</span><input style={S.input} type="number" inputMode="decimal" value={reserve} onChange={e=>setReserve(e.target.value)}/></label>
    <button style={{...S.primaryBtn,opacity:ok?1:0.5}} disabled={!ok} onClick={()=>onSave({name:name.trim(),unitType,stockMode,reserveMonths:parseFloat(reserve)||0,farms,units:clean})}>{initial?"変更を保存":"登録する"}</button>
  </div>);
}
function AddView({onSave,onCancel}){ return <ItemForm onSave={onSave} onCancel={onCancel} title="餌を追加"/>; }
function EditView({item,onSave,onCancel}){ return <ItemForm initial={item} onSave={onSave} onCancel={onCancel} title="餌を編集"/>; }
