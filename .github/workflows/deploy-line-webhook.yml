name: Deploy line-webhook (Supabase)

# 手動実行のみ。Supabase の Edge Function `line-webhook` をデプロイする。
# 事前に以下のリポジトリ Secrets が必要:
#   SUPABASE_ACCESS_TOKEN … Supabase アカウントのアクセストークン（Account > Access Tokens）
#   SUPABASE_PROJECT_REF  … プロジェクト参照ID（Project Settings > General > Reference ID）
# ※ 関数側の Secrets（LINE_TOKEN 等）は Supabase 側で設定済みのものがそのまま使われる。
#
# 自動デプロイにしたい場合は on: に push（paths: supabase/functions/**）を追加する。

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy line-webhook --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
