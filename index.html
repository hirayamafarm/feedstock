<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

// ── Supabase 接続 ───────────────────────────────
const CONFIGURED = !String(window.SUPABASE_URL).includes("ここに") && /^https?:\/\//.test(String(window.SUPABASE_URL));
const sb = CONFIGURED ? window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY) : null;
const STATE_ID = "main";   // 在庫データは1行で共有

async function loadState() {
  const { data, error } = await sb.from("app_state").select("data").eq("id", STATE_ID).maybeSingle();
  if (error) { console.error(error); return null; }
  return data ? data.data : null;
}
async function saveState(s) {
  const { error } = await sb.from("app_state").upsert({ id: STATE_ID, data: s, updated_at: new Date().toISOString() });
  if (error) { console.error(error); return false; }
  return true;
}
async function loadLog() {
  const { data, error } = await sb.from("change_log").select("*").order("at", { ascending: false }).limit(100);
  if (error) { console.error(error); return []; }
  return data || [];
}
async function appendLog(entry) {
  const { error } = await sb.from("change_log").insert(entry);
  if (error) console.error(error);
}

// ── ユーティリティ ──────────────────────────────
const fmt = (n) => n == null || isNaN(n) ? "—" : Number(n).toLocaleString("ja-JP", { maximumFractionDigits: 1 });
const ym = (d) => d.slice(0, 7);
const today = () => new Date().toISOString().slice(0, 10);
const thisMonth = () => today().slice(0, 7);
const daysInMonth = (y, m) => new Date(y, m, 0).getDate();
const iso = (y, m, d) => `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

const DEFAULT_FARMS = [{ id: "a", name: "第1農場" }, { id: "b", name: "第2農場" }];
let FARMS = DEFAULT_FARMS.slice(); // App内で state.farms と同期。各コンポーネントから参照する。

function unitOf(item){ return item?.unitType==="piece"?"個":"kg"; }
function countToKg(item, q){
  if(!q) return 0;
  if(q.__kg!=null) return Number(q.__kg)||0;  // 手入力(kg直接)
  let kg=0; for(const u of (item.units||[])){ const n=q?.[u.id]; if(n) kg+=n*u.kg;} return kg;
}

const SEED = {
  farms: [{ id: "a", name: "第1農場" }, { id: "b", name: "第2農場" }],
  items: [
    { id:1, name:"チモシー乾草", reserveMonths:0.5, farms:["a","b"],
      units:[{id:"r",label:"ロール",kg:300},{id:"c",label:"コンテナ",kg:1200}],
      counts:{a:[{date:"2026-04-15",qtys:{r:2,c:1}},{date:"2026-05-15",qtys:{r:1,c:0}}],
              b:[{date:"2026-04-15",qtys:{r:1,c:1}},{date:"2026-05-15",qtys:{r:2,c:0}}]},
      orders:[{id:901,kg:1200,etaDate:"2026-06-10",received:false}],
      orderPresets:[{id:"p1",label:"コンテナ1台",kg:1200},{id:"p2",label:"ロール10本",kg:3000}] },
    { id:2, name:"アルファルファ牧草", reserveMonths:0.5, farms:["a"],
      units:[{id:"b",label:"ベール",kg:25}],
      counts:{a:[{date:"2026-04-15",qtys:{b:8}},{date:"2026-05-15",qtys:{b:3}}]}, orders:[] },
    { id:3, name:"圧片大麦", reserveMonths:1, farms:["b"],
      units:[{id:"s",label:"袋",kg:20}],
      counts:{b:[{date:"2026-04-15",qtys:{s:30}},{date:"2026-05-15",qtys:{s:18}}]}, orders:[] },
  ],
  nextId:4, nextOrderId:902,
};

// ── 消費計算 ────────────────────────────────────
function farmStats(item, fid){
  const counts=[...(item.counts?.[fid]||[])].sort((a,b)=>a.date.localeCompare(b.date));
  const last=counts[counts.length-1]||null, prev=counts[counts.length-2]||null;
  const lastKg=last?countToKg(item,last.qtys):null;
  const fd=item.feedDaily?.[fid];
  let baseDaily=null, source=null;
  if(fd&&fd.dailyKg>0){ baseDaily=fd.dailyKg; source="excel"; }
  else if(last&&prev){
    const days=Math.max(1,Math.round((new Date(last.date)-new Date(prev.date))/86400000));
    const diff=countToKg(item,prev.qtys)-lastKg;
    baseDaily=diff>0?diff/days:0; source="count";
  }
  const extra=(item.extraDaily?.[fid])||0;   // 別給与（1日あたりkg・Excel/棚卸しに含まれない分）
  let dailyKg=baseDaily!=null?baseDaily+extra:(extra>0?extra:null);
  if(baseDaily==null&&extra>0) source="extra";
  const usage=dailyKg!=null?dailyKg*30:null;
  return { last,lastKg,usage,dailyKg,baseDaily,extra,source,lastDate:last?.date||null };
}
function analyze(item){
  let totalStock=0,totalUsage=0,hasUsage=false,hasExcel=false;
  for(const fid of item.farms){
    const fs=farmStats(item,fid);
    if(fs.lastKg!=null) totalStock+=fs.lastKg;
    if(fs.usage!=null){ totalUsage+=fs.usage; hasUsage=true; if(fs.source==="excel") hasExcel=true; }
  }
  const pendingKg=(item.orders||[]).filter(o=>!o.received).reduce((s,o)=>s+o.kg,0);
  let suggestedOrder=null, monthsLeft=null;
  if(hasUsage&&totalUsage>0){
    const eff=totalStock+pendingKg; monthsLeft=eff/totalUsage;
    const need=totalUsage*(1+(item.reserveMonths||0));
    suggestedOrder=Math.max(0,Math.ceil(need-eff));
  }
  return { totalStock,pendingKg,totalUsage:hasUsage?totalUsage:null,monthsLeft,suggestedOrder,hasExcel };
}
function simulateMonth(item, scope, ymStr){
  const [Y,M]=ymStr.split("-").map(Number); const dim=daysInMonth(Y,M);
  let startDate,startKg,dailyUse; const orders=item.orders||[];
  if(scope==="all"){
    let total=0,usageSum=0,latest=null,ok=false;
    for(const fid of item.farms){ const fs=farmStats(item,fid);
      if(fs.lastKg!=null) total+=fs.lastKg;
      if(fs.lastDate&&(!latest||fs.lastDate>latest)) latest=fs.lastDate;
      if(fs.usage!=null){ usageSum+=fs.usage; ok=true; } }
    startDate=latest; startKg=total; dailyUse=ok?usageSum/30:0;
  } else { const fs=farmStats(item,scope); startDate=fs.lastDate; startKg=fs.lastKg||0; dailyUse=(fs.usage||0)/30; }
  if(!startDate) return null;
  let farmShare=1;
  if(scope!=="all"){ let us=0,mine=0; for(const fid of item.farms){ const u=farmStats(item,fid).usage||0; us+=u; if(fid===scope) mine=u; } farmShare=us>0?mine/us:1/item.farms.length; }
  const arrivals={}, arrInfo={};
  for(const o of orders){ const k=o.kg*(scope==="all"?1:farmShare);
    arrivals[o.etaDate]=(arrivals[o.etaDate]||0)+k;
    const c=arrInfo[o.etaDate]||{kg:0,anyPending:false,anyReceived:false}; c.kg+=k; if(o.received)c.anyReceived=true; else c.anyPending=true; arrInfo[o.etaDate]=c; }
  const cells=[]; let kg=startKg; const monthStart=iso(Y,M,1);
  let cursor=startDate;
  const stepTo=(t)=>{ while(cursor<t){ const d=new Date(cursor); d.setDate(d.getDate()+1); const nx=d.toISOString().slice(0,10); if(arrivals[nx]) kg+=arrivals[nx]; kg=Math.max(0,kg-dailyUse); cursor=nx; } };
  if(cursor<=monthStart) stepTo(monthStart);
  for(let day=1;day<=dim;day++){
    const date=iso(Y,M,day); const info=arrInfo[date];
    if(date<startDate){ cells.push({day,date,kg:null,before:true,info}); continue; }
    if(date===startDate){ cells.push({day,date,kg:startKg,anchor:true,info}); kg=startKg; cursor=date; continue; }
    if(arrivals[date]) kg+=arrivals[date]; kg=Math.max(0,kg-dailyUse); cursor=date;
    cells.push({day,date,kg,info});
  }
  return { cells,dailyUse,startDate,dim,Y,M };
}

// ── メイン ──────────────────────────────────────
function App(){
  const [state,setState]=useState(null);
  const [view,setView]=useState("order");
  const [selId,setSelId]=useState(null);
  const [sync,setSync]=useState("loading");
  const [log,setLog]=useState([]);
  const [me,setMe]=useState("");
  const dirty=useRef(false), loaded=useRef(false), pendingLog=useRef(null);

  useEffect(()=>{ (async()=>{
    if(!CONFIGURED){ setSync("noconfig"); return; }
    const s=await loadState();
    if(s){ setState(s); setSync("saved"); }
    else { setState(SEED); const ok=await saveState(SEED); setSync(ok?"saved":"error"); }
    setLog(await loadLog()); loaded.current=true;
  })(); },[]);

  useEffect(()=>{
    if(!loaded.current||!dirty.current||!state) return;
    setSync("saving");
    saveState(state).then(async(ok)=>{
      setSync(ok?"saved":"error");
      if(ok&&pendingLog.current){ const e={who:me||"(名前未設定)",what:pendingLog.current,at:new Date().toISOString()};
        await appendLog(e); setLog(l=>[e,...l].slice(0,100)); }
      pendingLog.current=null;
    });
    dirty.current=false;
  },[state]);

  useEffect(()=>{ const t=setInterval(async()=>{ if(dirty.current||!loaded.current) return;
    const s=await loadState(); if(s) setState(p=>JSON.stringify(p)===JSON.stringify(s)?p:s); },30000); return ()=>clearInterval(t); },[]);

  if(sync==="noconfig") return <Config/>;
  if(!state) return <div style={S.loading}>読み込み中…</div>;
  FARMS = (state.farms&&state.farms.length>0)?state.farms:DEFAULT_FARMS;

  const update=(fn,desc)=>{ dirty.current=true; if(desc) pendingLog.current=desc; setState(p=>fn(JSON.parse(JSON.stringify(p)))); };
  const refreshNow=async()=>{ const s=await loadState(); if(s){ setState(s); setSync("saved"); } setLog(await loadLog()); };
  const nameOf=(id)=>state.items.find(i=>i.id===id)?.name||"餌";
  const saveCount=(id,fid,date,qtys)=>{
    // 棚卸し前の状態で予測残量を計算し、差分を記録
    const it=state.items.find(i=>i.id===id);
    let pred=null;
    if(it){
      const counts=[...(it.counts?.[fid]||[])].sort((a,b)=>a.date.localeCompare(b.date)).filter(c=>ym(c.date)!==ym(date));
      if(counts.length>0){
        const last=counts[counts.length-1];
        const fs=farmStats(it,fid); const dailyKg=fs.dailyKg||0;
        const days=Math.max(0,Math.round((new Date(date)-new Date(last.date))/86400000));
        let arrival=0;
        for(const o of (it.orders||[])){ if(o.etaDate>last.date&&o.etaDate<=date){
          // 農場別に按分（消費比）
          let share=1;
          if(it.farms.length>1){ let total=0,mine=0; for(const ff of it.farms){ const u=farmStats(it,ff).usage||0; total+=u; if(ff===fid) mine=u; } share=total>0?mine/total:1/it.farms.length; }
          arrival+=o.kg*share;
        } }
        pred=Math.max(0, countToKg(it,last.qtys) - dailyKg*days + arrival);
      }
    }
    update(s=>{
      const it2=s.items.find(i=>i.id===id); it2.counts=it2.counts||{}; it2.counts[fid]=it2.counts[fid]||[];
      const ex=it2.counts[fid].find(c=>ym(c.date)===ym(date)); if(ex){ex.date=date;ex.qtys=qtys;} else it2.counts[fid].push({date,qtys});
      // 差分記録
      if(pred!=null){
        const actual=countToKg(it2,qtys);
        const diff=actual-pred;
        const pct=pred>0?(diff/pred*100):null;
        s.discrepancies=s.discrepancies||[];
        // 同じ餌・農場・棚卸し月の記録があれば置き換え
        s.discrepancies=s.discrepancies.filter(r=>!(r.itemId===id&&r.farmId===fid&&ym(r.date)===ym(date)));
        s.discrepancies.unshift({itemId:id,farmId:fid,date,predictedKg:pred,actualKg:actual,diffKg:diff,pctDiff:pct,recordedAt:new Date().toISOString()});
        s.discrepancies=s.discrepancies.slice(0,200);
      }
      return s;
    },`棚卸し: ${nameOf(id)}（${FARMS.find(f=>f.id===fid)?.name} ${date}）${pred!=null?` 予測${fmt(Math.round(pred))}kg→実測${fmt(Math.round(countToKg(it,qtys)))}kg`:""}`);
  };
  const addOrder=(id,kg,etaDate)=>update(s=>{ const it=s.items.find(i=>i.id===id); it.orders=it.orders||[]; it.orders.push({id:s.nextOrderId,kg,etaDate,received:false}); s.nextOrderId++; return s; },
    `発注予定追加: ${nameOf(id)} ${fmt(kg)}kg（入荷${etaDate}）`);
  const addPreset=(id,label,kg)=>update(s=>{ const it=s.items.find(i=>i.id===id); it.orderPresets=it.orderPresets||[]; it.orderPresets.push({id:"p"+Date.now(),label,kg}); return s; },`発注パターン追加: ${nameOf(id)} ${label}`);
  const delPreset=(id,pid)=>update(s=>{ const it=s.items.find(i=>i.id===id); it.orderPresets=(it.orderPresets||[]).filter(p=>p.id!==pid); return s; },`発注パターン削除: ${nameOf(id)}`);
  const toggleReceived=(id,oid)=>update(s=>{ const o=s.items.find(i=>i.id===id).orders.find(x=>x.id===oid); if(o)o.received=!o.received; return s; },`入荷チェック更新: ${nameOf(id)}`);
  const delOrder=(id,oid)=>update(s=>{ const it=s.items.find(i=>i.id===id); it.orders=it.orders.filter(x=>x.id!==oid); return s; },`発注予定削除: ${nameOf(id)}`);
  const addItem=(it)=>update(s=>{ s.items.push({...it,id:s.nextId,counts:{},orders:[]}); s.nextId++; return s; },`餌を追加: ${it.name}`);
  const editItem=(id,patch)=>update(s=>{ const it=s.items.find(i=>i.id===id); if(!it) return s;
    it.name=patch.name; it.unitType=patch.unitType; it.reserveMonths=patch.reserveMonths; it.farms=patch.farms; it.units=patch.units; return s;
  },`餌を編集: ${patch.name}`);
  const delItem=(id)=>update(s=>{ s.items=s.items.filter(i=>i.id!==id); return s; },`餌を削除: ${nameOf(id)}`);
  const applyFeedDaily=(id,fid,info)=>update(s=>{ const it=s.items.find(i=>i.id===id); it.feedDaily=it.feedDaily||{}; it.feedDaily[fid]=info; return s; },
    `給餌Excel取込: ${nameOf(id)}（${FARMS.find(f=>f.id===fid)?.name} 日次${fmt(info.dailyKg)}kg）`);
  const clearFeedDaily=(id,fid)=>update(s=>{ const it=s.items.find(i=>i.id===id); if(it.feedDaily) delete it.feedDaily[fid]; return s; },`給餌Excel取消: ${nameOf(id)}`);
  const setExtra=(id,fid,kg)=>update(s=>{ const it=s.items.find(i=>i.id===id); it.extraDaily=it.extraDaily||{};
    if(kg>0) it.extraDaily[fid]=kg; else delete it.extraDaily[fid]; return s; },
    `別給与設定: ${nameOf(id)}（${FARMS.find(f=>f.id===fid)?.name} 1日${fmt(kg)}kg）`);
  const renameFarm=(fid,name)=>update(s=>{ s.farms=s.farms||DEFAULT_FARMS.slice(); const f=s.farms.find(x=>x.id===fid); if(f) f.name=name; return s; },
    `農場名変更: ${fid}=${name}`);

  const sel=state.items.find(i=>i.id===selId);
  return (
    <div style={S.app}>
      <header style={S.header}>
        <div style={S.headerTop}>
          <div style={S.logo}>◣ まきば在庫</div>
          <div style={S.headerRight}>
            <HeaderName me={me} onSet={setMe}/>
            <button style={S.syncBtn} onClick={refreshNow}>{sync==="saving"?"保存中…":sync==="error"?"⚠ 保存失敗":"🔄 更新"}</button>
          </div>
        </div>
        <div style={S.headerSub}>みんなで共有 ・ 棚卸し・発注・残量カレンダー</div>
      </header>
      <main style={S.main}>
        {(view==="order"||view==="inventory"||view==="calendar"||view==="diff"||view==="data"||view==="settings") && (<>
          <div style={S.tabBar}>
            <button style={{...S.navTab,...(view==="order"?S.navActive:{})}} onClick={()=>setView("order")}>発注</button>
            <button style={{...S.navTab,...(view==="inventory"?S.navActive:{})}} onClick={()=>setView("inventory")}>棚卸し</button>
            <button style={{...S.navTab,...(view==="calendar"?S.navActive:{})}} onClick={()=>setView("calendar")}>カレンダー</button>
            <button style={{...S.navTab,...(view==="diff"?S.navActive:{})}} onClick={()=>setView("diff")}>差分</button>
            <button style={{...S.navTab,...(view==="data"?S.navActive:{})}} onClick={()=>setView("data")}>取込/履歴</button>
            <button style={{...S.navTab,...(view==="settings"?S.navActive:{})}} onClick={()=>setView("settings")}>設定</button>
          </div>
          {view==="order"&&<OrderView items={state.items} onSelect={id=>{setSelId(id);setView("detail");}}/>}
          {view==="inventory"&&<InventoryView items={state.items} onSave={saveCount} onAdd={()=>setView("add")} onSelect={id=>{setSelId(id);setView("detail");}}/>}
          {view==="calendar"&&<CalendarView items={state.items}/>}
          {view==="diff"&&<DiffView items={state.items} records={state.discrepancies||[]}/>}
          {view==="data"&&<DataView items={state.items} log={log} me={me} onSetMe={setMe} onApply={applyFeedDaily} onClear={clearFeedDaily} onSetExtra={setExtra} onAddItem={addItem}/>}
          {view==="settings"&&<SettingsView farms={FARMS} onRenameFarm={renameFarm}/>}
        </>)}
        {view==="detail"&&sel&&<DetailView item={sel} onBack={()=>setView("inventory")}
          onAddOrder={(kg,eta)=>addOrder(sel.id,kg,eta)} onToggle={oid=>toggleReceived(sel.id,oid)}
          onDelOrder={oid=>delOrder(sel.id,oid)} onAddPreset={(l,k)=>addPreset(sel.id,l,k)}
          onDelPreset={pid=>delPreset(sel.id,pid)} onEdit={()=>setView("edit")} onDelete={()=>{delItem(sel.id);setView("inventory");}}/>}
        {view==="edit"&&sel&&<EditView item={sel} onSave={(patch)=>{editItem(sel.id,patch);setView("detail");}} onCancel={()=>setView("detail")}/>}
        {view==="add"&&<AddView onSave={it=>{addItem(it);setView("inventory");}} onCancel={()=>setView("inventory")}/>}
      </main>
    </div>
  );
}

function Config(){
  return (<div style={S.app}>
    <header style={S.header}><div style={S.logo}>◣ まきば在庫</div><div style={S.headerSub}>初期設定が必要です</div></header>
    <main style={S.main}>
      <div style={{...S.nameBanner, display:"block"}}>
        <p style={{marginTop:0,fontWeight:700}}>接続先が未設定です。</p>
        <p>index.html の先頭にある SUPABASE_URL と SUPABASE_KEY を、ご自分のSupabaseの値に書き換えて保存してください。手順書の STEP 2 を参照してください。</p>
      </div>
    </main>
  </div>);
}

function NameSetter({onSet}){
  const [v,setV]=useState("");
  return (<div style={S.inlineRow}>
    <input style={S.input} placeholder="例: 田中" value={v} onChange={e=>setV(e.target.value)}/>
    <button style={S.addMini} onClick={()=>v.trim()&&onSet(v.trim())}>設定</button>
  </div>);
}

function HeaderName({me,onSet}){

function DiffView({items,records}){
  const [filterItem,setFilterItem]=useState("all");
  const [filterFarm,setFilterFarm]=useState("all");
  const rs=records.filter(r=>(filterItem==="all"||r.itemId===filterItem)&&(filterFarm==="all"||r.farmId===filterFarm));
  const overall=(()=>{
    if(rs.length===0) return null;
    const totalAct=rs.reduce((s,r)=>s+r.actualKg,0);
    const totalPred=rs.reduce((s,r)=>s+r.predictedKg,0);
    const totalDiff=totalAct-totalPred;
    const pct=totalPred>0?(totalDiff/totalPred*100):null;
    return {n:rs.length,totalDiff,pct};
  })();
  return (<div style={S.fade}>
    <h2 style={S.h2}>予測と実測の差</h2>
    <div style={S.lead}>棚卸しを保存するたびに、その時点の予測残量(消費から計算)と実際の在庫を比較して記録します。差が大きい場合は1日あたり消費の見直しや、別給与の確認が必要なサインです。</div>
    <div style={S.inlineRow}>
      <label style={S.colSel}>餌で絞り込み<select style={S.select} value={filterItem} onChange={e=>setFilterItem(e.target.value==="all"?"all":Number(e.target.value))}>
        <option value="all">すべて</option>
        {items.map(it=><option key={it.id} value={it.id}>{it.name}</option>)}
      </select></label>
      <label style={S.colSel}>農場で絞り込み<select style={S.select} value={filterFarm} onChange={e=>setFilterFarm(e.target.value)}>
        <option value="all">すべて</option>
        {FARMS.map(f=><option key={f.id} value={f.id}>{f.name}</option>)}
      </select></label>
    </div>
    {overall&&(<div style={S.resultBox}>
      <div>表示中 {overall.n}件</div>
      <div>差の合計: <b style={{color:overall.totalDiff>=0?"var(--ok)":"var(--bad)"}}>{overall.totalDiff>=0?"+":""}{fmt(Math.round(overall.totalDiff))}kg</b>{overall.pct!=null&&` （${overall.pct>=0?"+":""}${fmt(overall.pct.toFixed(1))}%）`}</div>
      <div style={{fontSize:11.5,color:"var(--muted)",marginTop:4}}>プラスは実測が予測より多い（消費が少なめだった）／マイナスは予測より少ない（消費が多めだった）</div>
    </div>)}
    {rs.length===0&&<div style={S.empty}>該当する記録はまだありません。棚卸しを2回以上保存すると差分が記録されます。</div>}
    {rs.map((r,i)=>{ const it=items.find(x=>x.id===r.itemId); const fn=FARMS.find(x=>x.id===r.farmId)?.name||r.farmId;
      const sign=r.diffKg>=0?"+":""; const col=Math.abs(r.diffKg)<10?"var(--muted)":r.diffKg>=0?"var(--ok)":"var(--bad)"; const u=unitOf(it);
      return (<div key={i} style={S.diffRow}>
        <div style={S.diffHead}>
          <span style={{fontWeight:700,fontSize:14}}>{it?.name||"(削除済み)"}</span>
          <span style={{fontSize:12,color:"var(--muted)"}}>{fn} ・ {r.date}</span>
        </div>
        <div style={S.diffBody}>
          <span style={S.diffCell}>予測 <b>{fmt(Math.round(r.predictedKg))}</b>{u}</span>
          <span style={S.diffArrow}>→</span>
          <span style={S.diffCell}>実測 <b>{fmt(Math.round(r.actualKg))}</b>{u}</span>
          <span style={{...S.diffDelta,color:col}}>{sign}{fmt(Math.round(r.diffKg))}{u}{r.pctDiff!=null&&` (${sign}${fmt(r.pctDiff.toFixed(1))}%)`}</span>
        </div>
      </div>);
    })}
  </div>);
}

// ── 棚卸し ──────────────────────────────────────
function InventoryView({items,onSave,onAdd,onSelect}){
  const [farm,setFarm]=useState("a"); const [date,setDate]=useState(today());
  const [vals,setVals]=useState({});   // { itemId: { unitId: 個数 } }
  const [kgVals,setKgVals]=useState({}); // { itemId: kg }
  const [modes,setModes]=useState({});  // { itemId: "count" | "kg" }
  const farmItems=items.filter(i=>i.farms.includes(farm));
  const modeOf=(it)=>modes[it.id]||(it.units?.length?"count":"kg");
  const setMode=(id,m)=>setModes(s=>({...s,[id]:m}));
  const setQty=(id,uid,v)=>setVals(s=>({...s,[id]:{...(s[id]||{}),[uid]:v}}));
  const save=()=>{
    let n=0;
    for(const it of farmItems){
      const m=modeOf(it);
      if(m==="kg"){
        const v=kgVals[it.id];
        if(v!==undefined&&v!==""){ onSave(it.id,farm,date,{__kg:parseFloat(v)||0}); n++; }
      } else {
        const raw=vals[it.id]; if(!raw) continue; const q={}; let any=false;
        for(const u of (it.units||[])){ const v=raw[u.id]; if(v!==undefined&&v!==""){ q[u.id]=parseFloat(v)||0; any=true; } }
        if(any){ onSave(it.id,farm,date,q); n++; }
      }
    }
    if(n){ setVals({}); setKgVals({}); }
  };
  return (<div style={S.fade}>
    <div style={S.lead}>その日に見た在庫を入力します。餌ごとに「個数」「kg直接」を切替できます。</div>
    <div style={S.farmRow}>{FARMS.map(f=><button key={f.id} style={{...S.farmTab,...(farm===f.id?S.farmActive:{})}} onClick={()=>setFarm(f.id)}>{f.name}</button>)}</div>
    <label style={S.field}><span style={S.fieldLabel}>棚卸し日</span><input style={S.input} type="date" value={date} onChange={e=>setDate(e.target.value)}/></label>
    <h3 style={S.h3}>各餌の在庫</h3>
    {farmItems.length===0&&<div style={S.empty}>この農場の餌が未登録です。</div>}
    {farmItems.map(it=>{
      const counts=[...(it.counts?.[farm]||[])].sort((a,b)=>b.date.localeCompare(a.date)); const last=counts[0];
      const u=unitOf(it);
      const m=modeOf(it); const live=m==="kg"?(parseFloat(kgVals[it.id])||0):countToKg(it,vals[it.id]);
      const hasUnits=it.units?.length>0;
      return (<div key={it.id} style={S.invCard}>
        <div style={S.invHead}><button style={S.invName} onClick={()=>onSelect(it.id)}>{it.name}</button>
          <span style={S.invLast}>{last?`前回 ${fmt(countToKg(it,last.qtys))}${u}`:"記録なし"}</span></div>
        {hasUnits&&(<div style={S.invModeRow}>
          <button style={{...S.invModeTab,...(m==="count"?S.invModeActive:{})}} onClick={()=>setMode(it.id,"count")}>個数(単位)</button>
          <button style={{...S.invModeTab,...(m==="kg"?S.invModeActive:{})}} onClick={()=>setMode(it.id,"kg")}>{u}直接</button>
        </div>)}
        {m==="kg"?(
          <div style={S.kgInputRow}>
            <input style={S.unitInput} type="number" inputMode="decimal" placeholder={u==="kg"?"例: 450":"例: 12"} value={kgVals[it.id]??""} onChange={e=>setKgVals(s=>({...s,[it.id]:e.target.value}))}/>
            <span style={{fontSize:14,color:"var(--muted)",marginLeft:6}}>{u}</span>
          </div>
        ):(
          <div style={S.unitGrid}>{(it.units||[]).map(x=>(<div key={x.id} style={S.unitCell}>
            <span style={S.unitLabel}>{x.label}<span style={S.unitKg}>{x.kg}{u}</span></span>
            <input style={S.unitInput} type="number" inputMode="decimal" placeholder="0" value={vals[it.id]?.[x.id]??""} onChange={e=>setQty(it.id,x.id,e.target.value)}/></div>))}</div>
        )}
        <div style={S.invKg}>合計 {fmt(live)} {u}</div>
      </div>); })}
    <button style={S.primaryBtn} onClick={save}>この農場の棚卸しを保存</button>
    <button style={S.ghostBtn} onClick={onAdd}>＋ 餌を追加</button>
  </div>);
}

function DetailView({item,onBack,onAddOrder,onToggle,onDelOrder,onAddPreset,onDelPreset,onEdit,onDelete}){
  const an=analyze(item); const u=unitOf(item);
  const unitStr=(item.units||[]).map(x=>`${x.label} ${x.kg}${u}`).join(" / ");
  const presets=item.orderPresets||[];
  const [mode,setMode]=useState(presets.length?"preset":"manual");
  const [presetId,setPresetId]=useState(presets[0]?.id??""); const [okg,setOkg]=useState(""); const [eta,setEta]=useState(today());
  const [showPF,setShowPF]=useState(false); const [pLabel,setPLabel]=useState(""); const [pKg,setPKg]=useState("");
  const orders=[...(item.orders||[])].sort((a,b)=>b.etaDate.localeCompare(a.etaDate));
  const submitOrder=()=>{ let k; if(mode==="preset"){ k=presets.find(x=>x.id===presetId)?.kg; } else k=parseFloat(okg);
    if(!k||k<=0||!eta) return; onAddOrder(k,eta); setOkg(""); };
  const submitPreset=()=>{ const k=parseFloat(pKg); if(!pLabel.trim()||!k||k<=0) return; onAddPreset(pLabel.trim(),k); setPLabel("");setPKg("");setShowPF(false); };

    <div style={S.detailHead}>

    </div>
    <div style={S.statGrid}>
      <Stat label="現在庫" value={`${fmt(an.totalStock)} ${u}`}/>
      <Stat label="発注残(未入荷)" value={`${fmt(an.pendingKg)} ${u}`} highlight={an.pendingKg>0} hl="var(--warn)"/>
      <Stat label={an.hasExcel?"月間消費(Excel基準)":"月間消費(棚卸し推定)"} value={an.totalUsage!=null?`約${fmt(an.totalUsage)} ${u}`:"—"}/>
      <Stat label="残り月数(発注残込)" value={an.monthsLeft!=null?`約${fmt(an.monthsLeft)}ヶ月`:"—"}/>
      <Stat label="追加発注の目安" value={an.suggestedOrder!=null?`${fmt(an.suggestedOrder)} ${u}`:"—"} highlight={an.suggestedOrder>0}/>
    </div>
    <div style={S.note}>管理単位: <b>{u==="kg"?"kg":"個数"}</b>{unitStr&&` ／ 棚卸し単位: ${unitStr}`} ／ 安全在庫 {item.reserveMonths}ヶ月分 ／ 農場: {item.farms.map(f=>FARMS.find(x=>x.id===f)?.name).join("・")}
      {item.extraDaily&&Object.values(item.extraDaily).some(v=>v>0)&&(()=>{ const sum=item.farms.reduce((s,f)=>s+((item.extraDaily?.[f])||0),0); return ` ／ 別給与 計 1日${fmt(sum)}${u}（消費に上乗せ済）`; })()}
    </div>
    <h3 style={S.h3}>発注予定を追加</h3>

      <div style={S.modeRow}>
        <button style={{...S.modeTab,...(mode==="preset"?S.modeActive:{})}} onClick={()=>setMode("preset")}>パターンから</button>
        <button style={{...S.modeTab,...(mode==="manual"?S.modeActive:{})}} onClick={()=>setMode("manual")}>手入力({u})</button>
      </div>
      {mode==="preset"?(presets.length?(
        <select style={S.select} value={presetId} onChange={e=>setPresetId(e.target.value)}>{presets.map(p=><option key={p.id} value={p.id}>{p.label}（{fmt(p.kg)}{u}）</option>)}</select>
      ):<div style={S.miniNote}>パターン未登録です。下で追加するか手入力をどうぞ。</div>
      ):<input style={S.input} type="number" inputMode="decimal" placeholder={`数量 ${u}`} value={okg} onChange={e=>setOkg(e.target.value)}/>}
      <label style={{...S.field,marginTop:10,marginBottom:10}}><span style={S.fieldLabel}>入荷予定日</span><input style={S.input} type="date" value={eta} onChange={e=>setEta(e.target.value)}/></label>
      <button style={S.primaryBtn} onClick={submitOrder}>発注予定を追加</button>
    </div>
    <div style={S.presetBox}>
      <div style={S.presetHead}><span style={S.presetTitle}>発注パターン（1回◯{u}固定）</span>
        <button style={S.smallGhost} onClick={()=>setShowPF(v=>!v)}>{showPF?"閉じる":"＋ 追加"}</button></div>
      {presets.map(p=>(<div key={p.id} style={S.presetRow}><span style={{fontWeight:700,fontSize:14}}>{p.label}</span><span style={S.presetKg}>{fmt(p.kg)}{u}</span><button style={S.miniDel} onClick={()=>onDelPreset(p.id)}>×</button></div>))}
      {presets.length===0&&!showPF&&<div style={S.miniNote}>例: コンテナ1台=1200kg、ブロック1箱=12個 など、よく頼む量を登録できます。</div>}
      {showPF&&(<div style={S.inlineRow}>
        <input style={{...S.input,flex:1.4}} placeholder="名称(コンテナ1台 等)" value={pLabel} onChange={e=>setPLabel(e.target.value)}/>

      <button style={{...S.checkBox,...(o.received?S.checkOn:{})}} onClick={()=>onToggle(o.id)}>{o.received?"✓":""}</button>

        <span style={S.orderEta}>{o.received?"入荷済":"入荷予定"} {o.etaDate}</span></div>
      <button style={S.miniDel} onClick={()=>onDelOrder(o.id)}>×</button></div>))}
    {item.farms.map(fid=>{ const counts=[...(item.counts?.[fid]||[])].sort((a,b)=>b.date.localeCompare(a.date)); return (<div key={fid}>
      <h3 style={S.h3}>{FARMS.find(f=>f.id===fid)?.name} の棚卸し履歴</h3>
      {counts.length===0&&<div style={S.empty}>記録なし</div>}
      {counts.map((c,i)=>{ const detail=c.qtys?.__kg!=null?(u==="個"?"個数直接入力":"kg直接入力"):(item.units||[]).filter(x=>c.qtys?.[x.id]).map(x=>`${x.label}${fmt(c.qtys[x.id])}`).join(" ");
        return (<div key={i} style={S.logRow}><span style={S.logDate}>{c.date}</span><span style={S.logDetail}>{detail||"—"}</span><span style={S.logQty}>{fmt(countToKg(item,c.qtys))} {u}</span></div>); })}
    </div>); })}

// ── カレンダー ──────────────────────────────────
function CalendarView({items}){
  const [mode,setMode]=useState("single"); // single | all
  const [itemId,setItemId]=useState(items[0]?.id??null);
  const item=items.find(i=>i.id===itemId)||items[0];
  // 個別表示: 餌の使用農場+合計から1つ
  const singleScopeOpts=item?[...item.farms.map(f=>({id:f,name:FARMS.find(x=>x.id===f)?.name})),{id:"all",name:"合計"}]:[];
  const [scope,setScope]=useState(item?item.farms[0]:"all");
  // 全部表示: 合計/第1/第2/両方別
  const allScopeOpts=[{id:"all",name:"合計"},{id:"a",name:"第1農場"},{id:"b",name:"第2農場"},{id:"both",name:"両方別"}];
  const [allScope,setAllScope]=useState("all");
  const [month,setMonth]=useState(thisMonth());
  useEffect(()=>{ if(item&&!item.farms.includes(scope)&&scope!=="all") setScope(item.farms[0]); },[itemId]);
  if(!item) return <div style={S.empty}>餌が登録されていません。</div>;
  const [Y,M]=month.split("-").map(Number);
  const shift=(d)=>{ let y=Y,m=M+d; if(m<1){m=12;y--;} if(m>12){m=1;y++;} setMonth(`${y}-${String(m).padStart(2,"0")}`); };
  return (<div style={S.fade}>
    <div style={S.lead}>棚卸しを起点に、日々の消費と発注の入荷を見込んだ予想残量です。</div>
    <div style={S.modeRow}>
      <button style={{...S.modeTab,...(mode==="single"?S.modeActive:{})}} onClick={()=>setMode("single")}>個別表示</button>
      <button style={{...S.modeTab,...(mode==="all"?S.modeActive:{})}} onClick={()=>setMode("all")}>全部表示</button>
    </div>
    {mode==="single"?(<>
      <select style={S.select} value={itemId??""} onChange={e=>setItemId(Number(e.target.value))}>{items.map(it=><option key={it.id} value={it.id}>{it.name}</option>)}</select>
      <div style={{...S.farmRow,marginTop:10}}>{singleScopeOpts.map(o=><button key={o.id} style={{...S.farmTab,...(scope===o.id?S.farmActive:{})}} onClick={()=>setScope(o.id)}>{o.name}</button>)}</div>
    </>):(
      <div style={{...S.farmRow,marginTop:4}}>{allScopeOpts.map(o=><button key={o.id} style={{...S.farmTab,...(allScope===o.id?S.farmActive:{})}} onClick={()=>setAllScope(o.id)}>{o.name}</button>)}</div>
    )}
    <div style={S.calHead}><button style={S.calNav} onClick={()=>shift(-1)}>‹</button><span style={S.calTitle}>{Y}年{M}月</span><button style={S.calNav} onClick={()=>shift(1)}>›</button></div>
    {mode==="single"
      ? <MonthGrid item={item} scope={scope} ymStr={month} large/>
      : (<div>
          {items.map(it=>{
            // この餌で表示するscope群を決定
            let scopes;
            if(allScope==="both") scopes=it.farms.slice();
            else if(allScope==="all") scopes=["all"];
            else scopes=it.farms.includes(allScope)?[allScope]:[];
            if(scopes.length===0) return null;
            return (<div key={it.id} style={S.miniBox}>
              <div style={S.miniTitle}>{it.name}</div>
              {scopes.map(sc=>(<div key={sc} style={{marginBottom:8}}>
                {(allScope==="both"||scopes.length>1)&&<div style={S.miniSub}>{FARMS.find(f=>f.id===sc)?.name||"合計"}</div>}
                <MonthGrid item={it} scope={sc} ymStr={month} large={false}/>
              </div>))}
            </div>);
          })}
        </div>)
    }
  </div>);
}

function MonthGrid({item,scope,ymStr,large}){
  const sim=simulateMonth(item,scope,ymStr);
  const [Y,M]=ymStr.split("-").map(Number);
  const firstDow=new Date(Y,M-1,1).getDay();
  const wd=["日","月","火","水","木","金","土"];
  if(!sim) return <div style={S.empty}>棚卸し未入力</div>;
  const warn=sim.dailyUse*7; const u=unitOf(item);
  const cellStyle=large?S.dayCell:S.dayCellSmall;
  return (<div className={large?"cal-grid-wrap":""}>
    <div style={S.weekRow}>{wd.map((w,i)=><div key={i} style={{...S.weekCell,color:i===0?"var(--bad)":i===6?"#3a6ea5":"var(--muted)",fontSize:large?12:10}}>{w}</div>)}</div>
    <div style={S.calGrid}>
      {Array.from({length:firstDow}).map((_,i)=><div key={"e"+i}/>)}
      {sim.cells.map(c=>{ const isT=c.date===today(); let bg="var(--card)",col="var(--ink)";
        if(c.before){bg="transparent";col="var(--muted)";} else if(c.kg<=0){bg="rgba(168,73,47,.16)";col="var(--bad)";}
        else if(c.kg<=warn){bg="rgba(201,143,42,.16)";col="var(--warn)";} else if(c.anchor){bg="rgba(95,125,60,.16)";}
        const inf=c.info; return (<div key={c.day} style={{...cellStyle,background:bg,outline:isT?"2px solid var(--accent)":"none"}}>
          <span style={{...S.dayNum,fontSize:large?10.5:9}}>{c.day}</span>
          {inf&&large&&<span style={{...S.arrowMark,color:inf.anyReceived&&!inf.anyPending?"var(--ok)":"var(--accent)"}}>{inf.anyReceived&&!inf.anyPending?"✓入荷":"📦入荷"}</span>}
          {inf&&!large&&<span style={{...S.arrowMark,color:inf.anyReceived&&!inf.anyPending?"var(--ok)":"var(--accent)",fontSize:8}}>📦</span>}
          <span style={{...S.dayKg,color:col,fontSize:large?12:9.5}}>{c.before?"":fmt(Math.round(c.kg))}</span>
          {inf&&large&&<span style={S.arrKg}>+{fmt(Math.round(inf.kg))}</span>}
        </div>); })}
    </div>
    {large&&(<>
      <div style={S.legend}><span><i style={{background:"rgba(95,125,60,.5)"}}/>棚卸し日</span><span><i style={{background:"rgba(201,143,42,.6)"}}/>残りわずか</span><span><i style={{background:"rgba(168,73,47,.6)"}}/>在庫切れ</span><span>📦 入荷予定 ／ ✓ 入荷済</span></div>
      <div style={S.note}>1日あたり消費 約{fmt(sim.dailyUse)}{u}。数値は各日の予想残量({u})。入荷マークは発注予定の入荷予定日に表示。</div>
    </>)}
  </div>);
}

// ── 取込/履歴 ───────────────────────────────────
function DataView({items,log,me,onSetMe,onApply,onClear,onSetExtra,onAddItem}){
  return (<div style={S.fade}>
    <h2 style={S.h2}>給餌Excelの取込</h2>
    <div style={S.lead}>共有の給餌記録(Excel)を読み込み、実際の1日あたり消費を割り出します。これが棚卸しより優先され、発注・カレンダーに使われます。</div>
    <ExcelImport items={items} onApply={onApply} onClear={onClear} onAddItem={onAddItem}/>

    <h2 style={{...S.h2,marginTop:26}}>別給与（Excelに入らない一定量）</h2>
    <div style={S.lead}>給餌Excelに含まれない、ほぼ一定の追加消費を1日あたりkgで登録します。Excel/棚卸しの消費に上乗せして在庫予測に反映されます。0にすると解除されます。</div>
    <ExtraFeed items={items} onSetExtra={onSetExtra}/>

    <h2 style={{...S.h2,marginTop:26}}>変更履歴</h2>
    <div style={S.lead}>誰がいつ何を更新したかの記録です（直近100件・全員共有）。</div>
    <div style={S.nameLine}>あなたの名前: <b>{me||"未設定"}</b> <NameSetter onSet={onSetMe}/></div>
    {log.length===0&&<div style={S.empty}>まだ記録はありません</div>}
    {log.map((e,i)=>(<div key={i} style={S.logEntry}><span style={S.logWho}>{e.who}</span><span style={S.logWhat}>{e.what}</span><span style={S.logAt}>{new Date(e.at).toLocaleString("ja-JP",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"})}</span></div>))}
  </div>);
}
function ExtraFeed({items,onSetExtra}){
  const [itemId,setItemId]=useState(items[0]?.id??null);
  const [farm,setFarm]=useState("a");
  const item=items.find(i=>i.id===itemId)||items[0];
  const [kg,setKg]=useState("");
  useEffect(()=>{ if(item&&!item.farms.includes(farm)) setFarm(item.farms[0]); },[itemId]);
  useEffect(()=>{ setKg(item?.extraDaily?.[farm]!=null?String(item.extraDaily[farm]):""); },[itemId,farm]);
  if(!item) return <div style={S.empty}>餌が登録されていません。</div>;
  return (<div style={S.importBox}>
    <div style={S.inlineRow}>
      <label style={S.colSel}>餌<select style={S.select} value={itemId??""} onChange={e=>setItemId(Number(e.target.value))}>{items.map(it=><option key={it.id} value={it.id}>{it.name}</option>)}</select></label>
      <label style={S.colSel}>農場<select style={S.select} value={farm} onChange={e=>setFarm(e.target.value)}>{item.farms.map(f=><option key={f} value={f}>{FARMS.find(x=>x.id===f)?.name}</option>)}</select></label>
    </div>
    <label style={S.field}><span style={S.fieldLabel}>1日あたりの別給与（{unitOf(item)}）</span>
      <input style={S.input} type="number" inputMode="decimal" placeholder={unitOf(item)==="kg"?"例: 5":"例: 0.5"} value={kg} onChange={e=>setKg(e.target.value)}/></label>
    <button style={S.primaryBtn} onClick={()=>onSetExtra(item.id,farm,parseFloat(kg)||0)}>保存する</button>
    <h3 style={S.h3}>設定済みの別給与</h3>
    {items.flatMap(it=>(it.farms||[]).filter(fid=>it.extraDaily?.[fid]>0).map(fid=>{ const u=unitOf(it); return (
      <div key={it.id+fid} style={S.orderRow}><div style={S.orderInfo}>
        <span style={{fontWeight:700,fontSize:14}}>{it.name}・{FARMS.find(f=>f.id===fid)?.name}</span>
        <span style={S.orderEta}>1日 {fmt(it.extraDaily[fid])}{u}（月 約{fmt(it.extraDaily[fid]*30)}{u}）</span></div>
        <button style={S.miniDel} onClick={()=>onSetExtra(it.id,fid,0)}>×</button></div>); }))}
    {items.every(it=>!(it.farms||[]).some(fid=>it.extraDaily?.[fid]>0))&&<div style={S.empty}>まだ別給与の設定はありません。</div>}
  </div>);
}
function ExcelImport({items,onApply,onClear,onAddItem}){
  const [importMode,setImportMode]=useState("hirayama"); // hirayama | generic
  const [sheets,setSheets]=useState(null); const [sheetName,setSheetName]=useState("");
  const [farm,setFarm]=useState("a"); const [itemId,setItemId]=useState(items[0]?.id??null);
  const [dateCol,setDateCol]=useState(0); const [kgCol,setKgCol]=useState(1); const [headerRow,setHeaderRow]=useState(true); const [msg,setMsg]=useState("");
  const [hirayamaResults,setHirayamaResults]=useState(null); // { farmId: { feedName: {dailyKg, total, from, to, days, rows} } }
  const [selectedTargets,setSelectedTargets]=useState({}); // key="farm|feedname" -> itemId(target) or "new"

  const onFile=async(e)=>{ const f=e.target.files?.[0]; if(!f) return; try{
    const buf=await f.arrayBuffer();
    const wb=XLSX.read(buf,{cellDates:true});
    const obj={}; for(const nm of wb.SheetNames) obj[nm]=XLSX.utils.sheet_to_json(wb.Sheets[nm],{header:1,raw:false,dateNF:"yyyy-mm-dd"});
    setSheets(obj); setSheetName(wb.SheetNames[0]); setMsg("");
    if(importMode==="hirayama") parseHirayama(obj);
  }catch(err){ setMsg("読み込み失敗: "+err.message); } };

  // 平山牧場フォーマット解析
  function parseHirayama(sheets){
    const farmMap=[
      {keywords:["赤坂"], farmId:"a"},
      {keywords:["本場"], farmId:"b"},
    ];
    const results={};
    let foundAny=false;
    const debugSheets=Object.keys(sheets);
    for(const {keywords, farmId} of farmMap){
      // キーワードを含むシートを探す（前後空白・全角半角無視）
      const sheetName=debugSheets.find(nm=>{
        const norm=String(nm).replace(/\s/g,"").trim();
        return keywords.some(k=>norm.includes(k));
      });
      if(!sheetName){ console.log("not found for",keywords,"available:",debugSheets); continue; }
      const rows=sheets[sheetName]; if(!rows) continue;
      // 日付らしい値かどうか
      const isDateLike=(v)=>{
        if(v==null) return null;
        if(v instanceof Date) return v.toISOString().slice(0,10);
        const s=String(v).trim();
        if(/^\d{4}[-/]\d{1,2}[-/]\d{1,2}/.test(s)){ const d=new Date(s); if(!isNaN(d)) return d.toISOString().slice(0,10); }
        if(/^\d{1,2}\/\d{1,2}\/\d{2,4}/.test(s)){ const d=new Date(s); if(!isNaN(d)) return d.toISOString().slice(0,10); }
        return null;
      };
      // 日付行を探す（最初の30行、列1〜60あたりで日付が並ぶ行）
      let dateRow=-1, dateStartCol=2;
      for(let r=0;r<Math.min(rows.length,30);r++){
        const row=rows[r]||[]; let dc=0, firstC=-1;
        for(let c=0;c<Math.min(row.length,60);c++){
          if(isDateLike(row[c])){ dc++; if(firstC<0) firstC=c; }
        }
        if(dc>=3){ dateRow=r; dateStartCol=firstC; break; }
      }
      if(dateRow<0){ console.log("date row not found in",sheetName); continue; }
      const dates=[]; const dateCols=[];
      for(let c=dateStartCol;c<rows[dateRow].length;c++){
        const d=isDateLike(rows[dateRow][c]);
        if(d){ dateCols.push(c); dates.push(d); }
      }
      // 「使用量」を含むセクション開始行を全部探す
      const sectionStarts=[];
      for(let r=0;r<rows.length;r++){
        const v=rows[r]?.[0]; if(v&&String(v).includes("使用量")) sectionStarts.push(r);
      }
      // 各セクションの範囲 = 次のセクション開始 まで
      const ranges=sectionStarts.map((s,i)=>[s+1, sectionStarts[i+1]||rows.length]);
      // 餌名 -> 日付別合計
      const feedDaily={};
      for(const [start,end] of ranges){
        for(let r=start;r<end;r++){
          const name=rows[r]?.[0]; if(!name) continue;
          const ns=String(name).trim(); if(!ns||ns.includes("使用量")||ns.includes("合計")||ns.includes("乾物")||ns.includes("残餌")||ns.includes("ロボ配合平均")) continue;
          for(let i=0;i<dateCols.length;i++){
            const c=dateCols[i]; const v=rows[r][c];
            const num=typeof v==="number"?v:parseFloat(v);
            if(!isNaN(num)&&num>0){
              if(!feedDaily[ns]) feedDaily[ns]={};
              feedDaily[ns][dates[i]]=(feedDaily[ns][dates[i]]||0)+num;
            }
          }
        }
      }
      // 餌ごとに集計（合計・1日平均）
      const farmRes={};
      for(const [name,daily] of Object.entries(feedDaily)){
        const ds=Object.keys(daily).sort(); if(ds.length===0) continue;
        const total=ds.reduce((s,d)=>s+daily[d],0);
        const from=ds[0], to=ds[ds.length-1];
        const span=Math.max(1, Math.round((new Date(to)-new Date(from))/86400000)+1);
        farmRes[name]={dailyKg:total/span, total, from, to, days:span, rows:ds.length};
      }
      if(Object.keys(farmRes).length>0){ results[farmId]=farmRes; foundAny=true; }
    }
    if(!foundAny){ setMsg(`「赤坂」「本場」を含むシートが見つからないか、日付行が認識できませんでした。読み込めたシート: ${debugSheets.join(" / ")}。汎用モードに切り替えるか、開発者にこのメッセージを伝えてください。`); setHirayamaResults(null); return; }
    setHirayamaResults(results);
    // 初期の取込先候補を自動マッチ
    const targets={};
    for(const [fid,feeds] of Object.entries(results)){
      for(const feedName of Object.keys(feeds)){
        const match=items.find(it=>it.name===feedName||it.name.includes(feedName)||feedName.includes(it.name));
        targets[`${fid}|${feedName}`]=match?match.id:"new";
      }
    }
    setSelectedTargets(targets);
  }

  const applyAll=()=>{
    if(!hirayamaResults) return;
    let n=0,added=0;
    // newのものは先に追加。同名が複数農場にあれば1回だけ追加。
    const toAdd=new Set();
    for(const [fid,feeds] of Object.entries(hirayamaResults)){
      for(const feedName of Object.keys(feeds)){
        if(selectedTargets[`${fid}|${feedName}`]==="new") toAdd.add(feedName);
      }
    }
    // まず追加してitemIdを取り戻すのは難しいので、追加と反映を別パスに。
    // ここは「new」のものは追加だけして、反映は次回ボタンで、という割り切り。
    if(toAdd.size>0){
      // どの農場で使うかを集計
      for(const feedName of toAdd){
        const farms=[];
        for(const [fid,feeds] of Object.entries(hirayamaResults)){ if(feeds[feedName]) farms.push(fid); }
        onAddItem({name:feedName,unitType:"kg",reserveMonths:0.5,farms,units:[]});
        added++;
      }
    }
    // 既存への反映
    for(const [fid,feeds] of Object.entries(hirayamaResults)){
      for(const [feedName,info] of Object.entries(feeds)){
        const t=selectedTargets[`${fid}|${feedName}`];
        if(t!=="new"&&t!=="skip"&&t!=null&&typeof t==="number"){ onApply(t,fid,info); n++; }
      }
    }
    if(added>0) setMsg(`新規餌${added}件を登録しました。もう一度「すべて反映」を押すと、その分も消費量に反映されます（${n}件を反映済み）。`);
    else setMsg(`${n}件の消費量を反映しました。`);
  };

  // 汎用モードの計算
  const rows=sheets?.[sheetName]||[]; const preview=rows.slice(0,6); const colCount=Math.max(0,...rows.slice(0,10).map(r=>r.length||0)); const colOpts=Array.from({length:colCount},(_,i)=>i);
  const toDate=(v)=>{ if(v==null) return null; if(v instanceof Date) return v.toISOString().slice(0,10); const d=new Date(String(v).trim()); return isNaN(d)?null:d.toISOString().slice(0,10); };
  const compute=()=>{ const data=headerRow?rows.slice(1):rows; let total=0,dates=[]; for(const r of data){ const d=toDate(r[dateCol]); const kg=parseFloat(String(r[kgCol]).replace(/[^0-9.\-]/g,"")); if(d&&!isNaN(kg)){ total+=kg; dates.push(d); } }
    if(dates.length===0) return null; dates.sort(); const from=dates[0],to=dates[dates.length-1]; const span=Math.max(1,Math.round((new Date(to)-new Date(from))/86400000)+1); return {dailyKg:total/span,from,to,days:span,total,rows:dates.length}; };
  const result=sheets&&importMode==="generic"?compute():null; const item=items.find(i=>i.id===itemId);
  const colLabel=(c)=>{ const h=headerRow&&rows[0]?.[c]!=null?String(rows[0][c]):""; return `列${c+1}${h?"："+h:""}`; };

  return (<div>
    <div style={S.modeRow}>
      <button style={{...S.modeTab,...(importMode==="hirayama"?S.modeActive:{})}} onClick={()=>setImportMode("hirayama")}>平山牧場フォーマット</button>
      <button style={{...S.modeTab,...(importMode==="generic"?S.modeActive:{})}} onClick={()=>setImportMode("generic")}>汎用(列を選ぶ)</button>
    </div>
    <div style={{...S.miniNote,marginBottom:10}}>
      {importMode==="hirayama"
        ? "「赤坂入力」「本場入力」シートの『エサ使用量』『搾乳エサ使用量』『DRYエサ使用量』『未経産エサ使用量』を自動で見つけて、餌ごとに合算します。"
        : "1シートにつき「日付の列」と「kgの列」を選んで集計します。"}
    </div>
    <label style={S.uploadBtn}>Excelファイルを選択<input type="file" accept=".xlsx,.xls,.csv" style={{display:"none"}} onChange={onFile}/></label>
    {msg&&<div style={{...S.miniNote,color:msg.includes("失敗")?"var(--bad)":"var(--ok)"}}>{msg}</div>}

    {importMode==="hirayama"&&hirayamaResults&&(<div style={S.importBox}>
      <h3 style={{...S.h3,marginTop:0}}>自動検出された餌</h3>
      <div style={S.miniNote}>取込先の餌を選んでください。「(新規登録)」を選ぶと、新しい餌としてアプリに追加されます。同じ餌名が両農場に出ている場合、両方の農場に紐づきます。</div>
      {Object.entries(hirayamaResults).map(([fid,feeds])=>(<div key={fid} style={{marginTop:14}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:6,color:"var(--accent)"}}>{FARMS.find(f=>f.id===fid)?.name}</div>
        {Object.entries(feeds).sort((a,b)=>b[1].total-a[1].total).map(([feedName,info])=>{
          const key=`${fid}|${feedName}`;
          return (<div key={key} style={S.hyRow}>
            <div style={S.hyName}>{feedName}</div>
            <div style={S.hyStat}>1日 <b>{fmt(info.dailyKg)}</b>kg<span style={{color:"var(--muted)"}}>（{info.days}日 計{fmt(Math.round(info.total))}kg）</span></div>
            <select style={S.hyTarget} value={selectedTargets[key]||"new"} onChange={e=>{const v=e.target.value; setSelectedTargets(s=>({...s,[key]:(v==="new"||v==="skip")?v:Number(v)}));}}>
              <option value="new">→ 新規登録</option>
              {items.map(it=><option key={it.id} value={it.id}>→ {it.name}</option>)}
              <option value="skip">→ 取込まない</option>
            </select>
          </div>);
        })}
      </div>))}
      <button style={{...S.primaryBtn,marginTop:14}} onClick={applyAll}>すべて反映する</button>
    </div>)}

    {importMode==="generic"&&sheets&&(<div style={S.importBox}>
      <label style={S.field}><span style={S.fieldLabel}>シート</span>
        <select style={S.select} value={sheetName} onChange={e=>setSheetName(e.target.value)}>{Object.keys(sheets).map(nm=><option key={nm} value={nm}>{nm}</option>)}</select></label>
      <div style={S.previewWrap}><table style={S.previewTable}><tbody>{preview.map((r,ri)=>(<tr key={ri}>{colOpts.map(ci=><td key={ci} style={{...S.previewCell,fontWeight:ri===0&&headerRow?700:400}}>{r[ci]!=null?String(r[ci]):""}</td>)}</tr>))}</tbody></table></div>
      <label style={S.checkRow}><input type="checkbox" checked={headerRow} onChange={e=>setHeaderRow(e.target.checked)}/> 1行目は見出し</label>
      <div style={S.field}><span style={S.fieldLabel}>列の対応づけ</span><div style={S.inlineRow}>
        <label style={S.colSel}>日付の列<select style={S.select} value={dateCol} onChange={e=>setDateCol(Number(e.target.value))}>{colOpts.map(c=><option key={c} value={c}>{colLabel(c)}</option>)}</select></label>
        <label style={S.colSel}>kgの列<select style={S.select} value={kgCol} onChange={e=>setKgCol(Number(e.target.value))}>{colOpts.map(c=><option key={c} value={c}>{colLabel(c)}</option>)}</select></label></div></div>
      <div style={S.inlineRow}>
        <label style={S.colSel}>取込先の餌<select style={S.select} value={itemId??""} onChange={e=>setItemId(Number(e.target.value))}>{items.map(it=><option key={it.id} value={it.id}>{it.name}</option>)}</select></label>
        <label style={S.colSel}>農場<select style={S.select} value={farm} onChange={e=>setFarm(e.target.value)}>{FARMS.map(f=><option key={f.id} value={f.id}>{f.name}</option>)}</select></label></div>
      {result?(<div style={S.resultBox}><div><b>{result.rows}</b>件・{result.from}〜{result.to}（{result.days}日間）</div><div>合計 {fmt(result.total)}{unitOf(item)} → 1日あたり <b>{fmt(result.dailyKg)}{unitOf(item)}</b></div></div>):<div style={S.miniNote}>日付・値の列を正しく選ぶと結果が出ます。</div>}
      <button style={{...S.primaryBtn,opacity:result?1:0.5}} disabled={!result} onClick={()=>{ onApply(itemId,farm,result); setMsg(`${item?.name}（${FARMS.find(f=>f.id===farm)?.name}）に反映しました。`); }}>この消費量を反映する</button>
    </div>)}

    <h3 style={S.h3}>取込済みの消費量</h3>
    {items.flatMap(it=>(it.farms||[]).filter(fid=>it.feedDaily?.[fid]).map(fid=>{ const fd=it.feedDaily[fid]; const u=unitOf(it); return (
      <div key={it.id+fid} style={S.orderRow}><div style={S.orderInfo}><span style={{fontWeight:700,fontSize:14}}>{it.name}・{FARMS.find(f=>f.id===fid)?.name}</span><span style={S.orderEta}>1日 {fmt(fd.dailyKg)}{u}（{fd.from}〜{fd.to}）</span></div><button style={S.miniDel} onClick={()=>onClear(it.id,fid)}>×</button></div>); }))}
    {items.every(it=>!(it.farms||[]).some(fid=>it.feedDaily?.[fid]))&&<div style={S.empty}>まだ取込済みの消費量はありません（棚卸し差から推定中）。</div>}
  </div>);
}

// ── 餌追加 ──────────────────────────────────────
function ItemForm({initial,onSave,onCancel,title}){
  const [name,setName]=useState(initial?.name||"");
  const [unitType,setUnitType]=useState(initial?.unitType||"kg");
  const [reserve,setReserve]=useState(String(initial?.reserveMonths??"0.5"));
  const [farms,setFarms]=useState(initial?.farms?initial.farms.slice():["a","b"]);
  const [units,setUnits]=useState(initial?.units?initial.units.map(u=>({id:u.id,label:u.label,kg:String(u.kg)})):[{id:"u1",label:"",kg:""}]);
  const toggleFarm=(fid)=>setFarms(s=>s.includes(fid)?s.filter(x=>x!==fid):[...s,fid]);
  const setUnit=(i,k,v)=>setUnits(s=>s.map((u,idx)=>idx===i?{...u,[k]:v}:u));
  const addUnit=()=>setUnits(s=>[...s,{id:"u"+Date.now(),label:"",kg:""}]); const rmUnit=(i)=>setUnits(s=>s.filter((_,idx)=>idx!==i));
  const clean=units.filter(u=>u.label.trim()&&parseFloat(u.kg)>0).map(u=>({id:u.id,label:u.label.trim(),kg:parseFloat(u.kg)}));
  const ok=name.trim()&&farms.length>0;
  const uLabel=unitType==="piece"?"個":"kg";
  return (<div style={S.fade}>
    <button style={S.back} onClick={onCancel}>← 戻る</button>
    <h2 style={S.h2}>{title||"餌を追加"}</h2>
    <label style={S.field}><span style={S.fieldLabel}>名称</span><input style={S.input} value={name} onChange={e=>setName(e.target.value)} placeholder="例: チモシー乾草"/></label>
    <div style={S.field}><span style={S.fieldLabel}>管理単位</span>
      <div style={S.modeRow}>
        <button style={{...S.modeTab,...(unitType==="kg"?S.modeActive:{})}} onClick={()=>setUnitType("kg")}>kg管理</button>
        <button style={{...S.modeTab,...(unitType==="piece"?S.modeActive:{})}} onClick={()=>setUnitType("piece")}>個数管理</button>
      </div>
      <div style={{...S.miniNote,marginTop:4}}>{unitType==="kg"?"重さ(kg)で消費・発注を計算します。牧草・配合飼料など。":"個数で消費・発注を計算します。ミネラルブロックなど。"}</div>
    </div>
    <div style={S.field}><span style={S.fieldLabel}>使用する農場</span><div style={S.farmRow}>{FARMS.map(x=><button key={x.id} style={{...S.farmTab,...(farms.includes(x.id)?S.farmActive:{})}} onClick={()=>toggleFarm(x.id)}>{x.name}</button>)}</div></div>
    <div style={S.field}><span style={S.fieldLabel}>単位パターン（数える単位と1個あたり{uLabel}・空欄でも可）</span>
      {units.map((u,i)=>(<div key={u.id} style={S.unitEditRow}>
        <input style={{...S.input,flex:1.4}} placeholder={unitType==="kg"?"ロール / コンテナ など":"箱 / ブロック など"} value={u.label} onChange={e=>setUnit(i,"label",e.target.value)}/>
        <input style={{...S.input,flex:1}} type="number" inputMode="decimal" placeholder={uLabel} value={u.kg} onChange={e=>setUnit(i,"kg",e.target.value)}/>
        {units.length>1&&<button style={S.rmBtn} onClick={()=>rmUnit(i)}>×</button>}</div>))}
      <button style={S.smallGhost} onClick={addUnit}>＋ パターンを追加</button>
      {clean.length===0&&<div style={{...S.miniNote,marginTop:6}}>単位パターン未登録の場合、棚卸し画面では「{uLabel}直接入力」だけが使えます。</div>}
    </div>
    <label style={S.field}><span style={S.fieldLabel}>安全在庫（翌月棚卸しに加えて確保する月数）</span><input style={S.input} type="number" inputMode="decimal" value={reserve} onChange={e=>setReserve(e.target.value)}/></label>
    <button style={{...S.primaryBtn,opacity:ok?1:0.5}} disabled={!ok} onClick={()=>onSave({name:name.trim(),unitType,reserveMonths:parseFloat(reserve)||0,farms,units:clean})}>{initial?"変更を保存":"登録する"}</button>
  </div>);
}
function AddView({onSave,onCancel}){ return <ItemForm onSave={onSave} onCancel={onCancel} title="餌を追加"/>; }
function EditView({item,onSave,onCancel}){ return <ItemForm initial={item} onSave={onSave} onCancel={onCancel} title="餌を編集"/>; }
